<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OsNaf - Five Nights at Freddy's Web</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Ana Menü */
    #mainMenu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #1a0a0a 0%, #000 90%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-shadow: 0 0 15px #ff0000;
    }

    #mainMenu h1 {
      font-size: 4em;
      margin: 0;
      letter-spacing: 8px;
      animation: flicker 2s infinite;
      color: #ff4444;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.3; }
    }

    .subtitle {
      font-size: 0.9em;
      margin-bottom: 50px;
      color: #aaa;
      letter-spacing: 4px;
    }

    .night-select {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .night-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.2em;
      padding: 20px 30px;
      background: #111;
      color: #ff6666;
      border: 2px solid #ff0000;
      cursor: pointer;
      transition: all 0.3s;
      text-shadow: 0 0 10px #ff0000;
      box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }

    .night-btn:hover {
      background: #330000;
      box-shadow: 0 0 30px #ff0000;
      transform: scale(1.05);
      color: #fff;
    }

    .night-btn:active {
      transform: scale(0.95);
    }

    /* Oyun UI */
    #gameUI {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    #gameUI.active {
      display: block;
    }

    /* Üst bar */
    #topBar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 60px;
      align-items: center;
      background: rgba(0,0,0,0.8);
      padding: 12px 30px;
      border: 2px solid #333;
      border-radius: 5px;
      color: #fff;
      font-size: 1.1em;
      pointer-events: auto;
    }

    .power-indicator {
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    .power-indicator.warning {
      color: #ffaa00;
      text-shadow: 0 0 10px #ffaa00;
    }

    .power-indicator.danger {
      color: #ff0000;
      text-shadow: 0 0 15px #ff0000;
      animation: blink 0.5s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    .time-indicator {
      color: #ffffff;
      font-size: 1.4em;
    }

    /* Alt butonlar */
    #bottomControls {
      position: absolute;
      bottom: 30px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 10%;
      box-sizing: border-box;
      pointer-events: auto;
    }

    .door-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .ctrl-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7em;
      padding: 15px 20px;
      background: rgba(20,20,20,0.9);
      color: #ccc;
      border: 2px solid #555;
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: auto;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 4px;
    }

    .ctrl-btn:active, .ctrl-btn.pressed {
      background: #444;
      border-color: #fff;
      color: #fff;
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }

    .ctrl-btn.door-closed {
      background: #550000;
      border-color: #ff0000;
      color: #ff4444;
      box-shadow: 0 0 20px rgba(255,0,0,0.6);
    }

    .ctrl-btn.light-on {
      background: #444400;
      border-color: #ffff00;
      color: #ffff00;
      box-shadow: 0 0 20px rgba(255,255,0,0.5);
    }

    /* Tablet */
    #tabletOverlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 75%;
      max-width: 800px;
      aspect-ratio: 4/3;
      background: #111;
      border: 8px solid #444;
      border-radius: 15px;
      display: none;
      z-index: 20;
      pointer-events: auto;
      flex-direction: column;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }

    #tabletOverlay.active {
      display: flex;
    }

    #tabletHeader {
      background: #222;
      padding: 10px;
      text-align: center;
      color: #fff;
      font-size: 0.7em;
      border-bottom: 2px solid #555;
    }

    #cameraGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 5px;
      padding: 10px;
      flex: 1;
      background: #0a0a0a;
    }

    .cam-cell {
      background: #1a1a1a;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.5em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      text-align: center;
      padding: 5px;
    }

    .cam-cell:hover {
      border-color: #888;
      background: #222;
    }

    .cam-cell.selected {
      border: 2px solid #00ff00;
      box-shadow: 0 0 10px #00ff00;
      color: #fff;
    }

    .cam-cell .anim-indicator {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff0000;
      box-shadow: 0 0 8px #ff0000;
      display: none;
    }

    .cam-cell .anim-indicator.visible {
      display: block;
    }

    #tabletClose {
      font-family: 'Press Start 2P', monospace;
      background: #550000;
      color: #fff;
      border: none;
      padding: 15px;
      cursor: pointer;
      font-size: 0.7em;
      letter-spacing: 2px;
      border-top: 2px solid #555;
      border-radius: 0 0 8px 8px;
    }

    #tabletClose:hover {
      background: #880000;
    }

    /* Jumpscare overlay */
    #jumpscareOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      display: none;
      background: #000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #jumpscareOverlay.active {
      display: flex;
    }

    #jumpscareImage {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      animation: shake 0.15s infinite;
    }

    @keyframes shake {
      0% { transform: translate(2px, 0) rotate(0.5deg); }
      25% { transform: translate(-3px, 2px) rotate(-0.5deg); }
      50% { transform: translate(1px, -2px) rotate(0.3deg); }
      75% { transform: translate(-2px, -1px) rotate(-0.3deg); }
      100% { transform: translate(2px, 1px) rotate(0.5deg); }
    }

    .gameover-text {
      color: #ff0000;
      font-size: 2em;
      margin-top: 30px;
      text-shadow: 0 0 30px #ff0000;
      animation: blink 0.3s infinite;
    }

    /* Gece tamamlandı */
    #winOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 60;
      background: radial-gradient(circle, #111 0%, #000 90%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffdd00;
    }

    #winOverlay.active {
      display: flex;
    }

    #winOverlay h2 {
      font-size: 2.5em;
      text-shadow: 0 0 30px #ffdd00;
    }

    #backToMenu {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.9em;
      margin-top: 40px;
      padding: 15px 30px;
      background: #222;
      color: #ffdd00;
      border: 2px solid #ffdd00;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- Ana Menü -->
  <div id="mainMenu">
    <h1>OsNaf</h1>
    <p class="subtitle">Beş Gece. Hayatta Kal.</p>
    <div class="night-select">
      <button class="night-btn" data-night="1">Gece 1</button>
      <button class="night-btn" data-night="2">Gece 2</button>
      <button class="night-btn" data-night="3">Gece 3</button>
      <button class="night-btn" data-night="4">Gece 4</button>
      <button class="night-btn" data-night="5">Gece 5</button>
    </div>
    <p style="font-size:0.6em; color:#666;">(Robot .glb modellerini 'modeller/' klasörüne koyun)</p>
  </div>

  <!-- Oyun UI -->
  <div id="gameUI">
    <div id="topBar">
      <span>Güç: <span id="powerValue" class="power-indicator">100.0%</span></span>
      <span id="timeValue" class="time-indicator">12:00 AM</span>
    </div>

    <div id="bottomControls">
      <div class="door-control">
        <button id="lightLeft" class="ctrl-btn">🔦 Işık</button>
        <button id="doorLeft" class="ctrl-btn">🚪 Kapı</button>
      </div>
      <button id="openTablet" class="ctrl-btn" style="align-self:center; padding:20px 30px; font-size:0.8em;">📹 Kamera</button>
      <div class="door-control">
        <button id="lightRight" class="ctrl-btn">🔦 Işık</button>
        <button id="doorRight" class="ctrl-btn">🚪 Kapı</button>
      </div>
    </div>
  </div>

  <!-- Tablet -->
  <div id="tabletOverlay">
    <div id="tabletHeader">GÜVENLİK KAMERALARI - <span id="currentCamLabel">Kamera 1A</span></div>
    <div id="cameraGrid"></div>
    <button id="tabletClose">TABLETİ KAPAT</button>
  </div>

  <!-- Jumpscare -->
  <div id="jumpscareOverlay">
    <img id="jumpscareImage" src="" alt="Jumpscare" style="display:none;">
    <canvas id="jumpscareCanvas" width="400" height="400" style="display:none;"></canvas>
    <div class="gameover-text">GAME OVER</div>
  </div>

  <!-- Kazanma -->
  <div id="winOverlay">
    <h2>5:59 AM</h2>
    <p style="font-size:1.5em;">Hayatta Kaldın!</p>
    <button id="backToMenu">Menüye Dön</button>
  </div>

  <!-- Three.js Kütüphanesi -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ==================== DOM ELEMANLARI ====================
    const mainMenu = document.getElementById('mainMenu');
    const gameUI = document.getElementById('gameUI');
    const powerValue = document.getElementById('powerValue');
    const timeValue = document.getElementById('timeValue');
    const tabletOverlay = document.getElementById('tabletOverlay');
    const cameraGrid = document.getElementById('cameraGrid');
    const currentCamLabel = document.getElementById('currentCamLabel');
    const jumpscareOverlay = document.getElementById('jumpscareOverlay');
    const jumpscareImage = document.getElementById('jumpscareImage');
    const jumpscareCanvas = document.getElementById('jumpscareCanvas');
    const winOverlay = document.getElementById('winOverlay');
    const backToMenuBtn = document.getElementById('backToMenu');

    const doorLeftBtn = document.getElementById('doorLeft');
    const doorRightBtn = document.getElementById('doorRight');
    const lightLeftBtn = document.getElementById('lightLeft');
    const lightRightBtn = document.getElementById('lightRight');
    const openTabletBtn = document.getElementById('openTablet');
    const closeTabletBtn = document.getElementById('tabletClose');

    // ==================== OYUN DEĞİŞKENLERİ ====================
    let currentNight = 1;
    let power = 100.0;
    let timeHours = 0; // 0 = 12AM, 1-5 arası, 6 = 6AM
    let timeMinutes = 0; // oyun içi dakika (gerçek zamanla ilerler)
    let gameRunning = false;
    let gamePaused = false;
    let gameOver = false;
    let playerWon = false;

    // Kapı ve ışık durumları
    let doorLeftClosed = false;
    let doorRightClosed = false;
    let lightLeftOn = false;
    let lightRightOn = false;
    let tabletOpen = false;

    // Zamanlayıcı
    let lastTimestamp = 0;
    const NIGHT_DURATION = 360; // 6 dakika gerçek zaman (12AM-6AM)
    let elapsedGameTime = 0;

    // AI durumları
    const animatronics = {
      freddy: { name: 'Freddy', position: 0, maxPos: 6, difficulty: 0, moveTimer: 0, moveInterval: 5.0, model: null, group: new THREE.Group() },
      bonnie: { name: 'Bonnie', position: 0, maxPos: 5, difficulty: 0, moveTimer: 0, moveInterval: 4.0, model: null, group: new THREE.Group() },
      chica: { name: 'Chica', position: 0, maxPos: 5, difficulty: 0, moveTimer: 0, moveInterval: 4.5, model: null, group: new THREE.Group() },
      foxy: { name: 'Foxy', position: 0, maxPos: 4, difficulty: 0, moveTimer: 0, moveInterval: 6.0, model: null, group: new THREE.Group() }
    };

    // Kamera sistemi (FNAF1 haritası)
    const cameras = [
      { id: '1A', label: 'Sahne (1A)', row: 0, col: 0 },
      { id: '1B', label: 'Yemek Alanı (1B)', row: 0, col: 1 },
      { id: '1C', label: 'Korsan Koyu (1C)', row: 0, col: 2 },
      { id: '2A', label: 'Batı Koridor (2A)', row: 1, col: 0 },
      { id: '2B', label: 'Batı Salon (2B)', row: 1, col: 1 },
      { id: '3', label: 'Depo (3)', row: 1, col: 2 },
      { id: '4A', label: 'Doğu Koridor (4A)', row: 2, col: 0 },
      { id: '4B', label: 'Doğu Salon (4B)', row: 2, col: 1 },
      { id: '5', label: 'Arka Oda (5)', row: 2, col: 2 },
      { id: '6', label: 'Mutfak (6)', row: 3, col: 0 },
      { id: '7', label: 'Tuvaletler (7)', row: 3, col: 1 }
    ];
    let currentCameraIndex = 0;

    // ==================== THREE.JS KURULUMU ====================
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 2, 15);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 1.6, 0.5);
    camera.lookAt(0, 1.6, -2);

    // Işıklandırma (çok loş)
    const ambientLight = new THREE.AmbientLight(0x111122, 0.5);
    scene.add(ambientLight);

    const overheadLight = new THREE.PointLight(0x333344, 3, 8);
    overheadLight.position.set(0, 3, -1);
    overheadLight.castShadow = true;
    overheadLight.shadow.mapSize.width = 512;
    overheadLight.shadow.mapSize.height = 512;
    scene.add(overheadLight);

    // Kapı ışıkları (başlangıçta kapalı)
    const leftDoorLight = new THREE.SpotLight(0xffeedd, 8, 12, Math.PI / 6, 0.3, 1);
    leftDoorLight.position.set(-3.5, 1.5, -1.5);
    leftDoorLight.target.position.set(-3.5, 0.5, -4);
    leftDoorLight.castShadow = true;
    leftDoorLight.visible = false;
    scene.add(leftDoorLight);
    scene.add(leftDoorLight.target);

    const rightDoorLight = new THREE.SpotLight(0xffeedd, 8, 12, Math.PI / 6, 0.3, 1);
    rightDoorLight.position.set(3.5, 1.5, -1.5);
    rightDoorLight.target.position.set(3.5, 0.5, -4);
    rightDoorLight.castShadow = true;
    rightDoorLight.visible = false;
    scene.add(rightDoorLight);
    scene.add(rightDoorLight.target);

    // ==================== OFİS İNŞASI ====================
    function createOffice() {
      const officeGroup = new THREE.Group();

      // Zemin
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(8, 10),
        new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      floor.receiveShadow = true;
      officeGroup.add(floor);

      // Arka duvar
      const backWall = new THREE.Mesh(
        new THREE.PlaneGeometry(8, 4),
        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 })
      );
      backWall.position.set(0, 2, -5);
      backWall.receiveShadow = true;
      officeGroup.add(backWall);

      // Sol duvar
      const leftWall = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 4),
        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 })
      );
      leftWall.rotation.y = Math.PI / 2;
      leftWall.position.set(-4, 2, 0);
      leftWall.receiveShadow = true;
      officeGroup.add(leftWall);

      // Sağ duvar
      const rightWall = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 4),
        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 })
      );
      rightWall.rotation.y = -Math.PI / 2;
      rightWall.position.set(4, 2, 0);
      rightWall.receiveShadow = true;
      officeGroup.add(rightWall);

      // Tavan
      const ceiling = new THREE.Mesh(
        new THREE.PlaneGeometry(8, 10),
        new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 })
      );
      ceiling.rotation.x = Math.PI / 2;
      ceiling.position.y = 4;
      officeGroup.add(ceiling);

      // Masa
      const desk = new THREE.Mesh(
        new THREE.BoxGeometry(2.5, 0.1, 1.2),
        new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.7 })
      );
      desk.position.set(0, 0.8, -0.5);
      desk.castShadow = true;
      desk.receiveShadow = true;
      officeGroup.add(desk);

      // Masa ayakları
      for (let sx = -1; sx <= 1; sx += 2) {
        for (let sz = -0.4; sz <= 0.4; sz += 0.8) {
          const leg = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.08, 0.8, 8),
            new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.8 })
          );
          leg.position.set(sx * 1, 0.4, -0.5 + sz);
          leg.castShadow = true;
          officeGroup.add(leg);
        }
      }

      // Posterler
      const posterMat = new THREE.MeshStandardMaterial({ color: 0x332211, roughness: 0.6 });
      const poster1 = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.8), posterMat);
      poster1.position.set(-3.8, 2.5, -2);
      officeGroup.add(poster1);

      const poster2 = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.8), posterMat);
      poster2.position.set(3.8, 2.5, -2);
      officeGroup.add(poster2);

      // Kapılar (sol ve sağ koridor girişleri)
      // Sol koridor girişi (duvarda boşluk)
      const leftDoorFrame = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, 2.5, 0.3),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      leftDoorFrame.position.set(-4, 1.25, -3.5);
      officeGroup.add(leftDoorFrame);

      const leftDoorFrameTop = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 0.2, 0.3),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      leftDoorFrameTop.position.set(-4, 2.4, -3.5);
      officeGroup.add(leftDoorFrameTop);

      // Sağ koridor girişi
      const rightDoorFrame = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, 2.5, 0.3),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      rightDoorFrame.position.set(4, 1.25, -3.5);
      officeGroup.add(rightDoorFrame);

      const rightDoorFrameTop = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 0.2, 0.3),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      rightDoorFrameTop.position.set(4, 2.4, -3.5);
      officeGroup.add(rightDoorFrameTop);

      // Hareketli kapı panelleri
      const leftDoorPanel = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 2.3, 1.0),
        new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 })
      );
      leftDoorPanel.position.set(-4, 1.15, -3.5);
      leftDoorPanel.name = 'leftDoorPanel';
      officeGroup.add(leftDoorPanel);

      const rightDoorPanel = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 2.3, 1.0),
        new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 })
      );
      rightDoorPanel.position.set(4, 1.15, -3.5);
      rightDoorPanel.name = 'rightDoorPanel';
      officeGroup.add(rightDoorPanel);

      return officeGroup;
    }

    const office = createOffice();
    scene.add(office);

    // Animatronik pozisyonları için referans noktaları (ofis içi, kapı arkası vb.)
    const leftDoorPos = new THREE.Vector3(-4, 1.0, -4.5);
    const rightDoorPos = new THREE.Vector3(4, 1.0, -4.5);
    const leftHallPos = new THREE.Vector3(-5, 1.0, -5.5);
    const rightHallPos = new THREE.Vector3(5, 1.0, -5.5);
    const officeCenter = new THREE.Vector3(0, 1.0, -1);

    // ==================== MODEL YÜKLEME ====================
    const loader = new GLTFLoader();
    const modelPaths = {
      freddy: 'modeller/freddy.glb',
      bonnie: 'modeller/bonnie.glb',
      chica: 'modeller/chica.glb',
      foxy: 'modeller/foxy.glb'
    };

    function createFallbackModel(color) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(

    function loadAnimatronicModel(key, color) {
      const path = modelPaths[key];
      loader.load(
        path,
        (gltf) => {
          const model = gltf.scene;
          model.scale.set(1, 1, 1);
          model.traverse((node) => {
            if (node.isMesh) {
              node.castShadow = true;
              node.receiveShadow = true;
            }
          });
          animatronics[key].model = model;
          animatronics[key].group.add(model);
          console.log(`${animatronics[key].name} modeli yüklendi.`);
        },
        undefined,
        (error) => {
          console.warn(`${animatronics[key].name} modeli yüklenemedi, yedek model kullanılıyor.`, error);
          const fallback = createFallbackModel(color);
          animatronics[key].model = fallback;
          animatronics[key].group.add(fallback);
        }
      );
      // Başlangıçta boş group'u sahneye ekle, pozisyonu güncellenecek
      scene.add(animatronics[key].group);
      animatronics[key].group.visible = false;
    }

    function updateCameraIndicators() {
      // Her kamerada hangi animatroniklerin olduğunu göster
      const camPresence = {};
      cameras.forEach(cam => { camPresence[cam.id] = []; });

      // Animatronik pozisyonlarına göre kamera varlığı (basitleştirilmiş)
      // Freddy: 0=sahne, 1=yemek, 2=tuvalet, 3=mutfak, 4=doğu koridor, 5=doğu salon, 6=ofis sağ
      // Bonnie: 0=sahne, 1=yemek, 2=batı koridor, 3=batı salon, 4=depo, 5=ofis sol
      // Chica: 0=sahne, 1=yemek, 2=doğu koridor, 3=doğu salon, 4=mutfak, 5=ofis sağ
      // Foxy: 0=korsan koyu, 1=batı koridor, 2=batı salon, 3=ofis sol, 4=ofis içi
      
      const posToCam = {
        freddy: ['1A', '1B', '7', '6', '4A', '4B', 'rightDoor'],
        bonnie: ['1A', '1B', '2A', '2B', '3', 'leftDoor'],
        chica: ['1A', '1B', '4A', '4B', '6', 'rightDoor'],
        foxy: ['1C', '2A', '2B', 'leftDoor', 'leftDoor']
      };

      Object.keys(animatronics).forEach(key => {
        const anim = animatronics[key];
        const pos = anim.position;
        const camList = posToCam[key];
        if (pos < camList.length) {
          const camId = camList[pos];
          if (camId && camPresence[camId]) {
            camPresence[camId].push(key);
          }
        }
      });

      // Göstergeleri güncelle
      cameras.forEach(cam => {
        const indicator = document.getElementById(`indicator-${cam.id}`);
        if (indicator) {
          if (camPresence[cam.id] && camPresence[cam.id].length > 0) {
            indicator.classList.add('visible');
          } else {
            indicator.classList.remove('visible');
          }
        }
      });
    }

    // ==================== OYUN MEKANİKLERİ ====================
    function setNightDifficulty(night) {
      // AI seviyeleri: Gece 1'den 5'e artar
      const diffMap = {
        1: { freddy: 0, bonnie: 1, chica: 1, foxy: 0 },
        2: { freddy: 1, bonnie: 2, chica: 2, foxy: 1 },
        3: { freddy: 2, bonnie: 3, chica: 3, foxy: 2 },
        4: { freddy: 3, bonnie: 4, chica: 4, foxy: 3 },
        5: { freddy: 4, bonnie: 5, chica: 5, foxy: 4 }
      };
      const diff = diffMap[night] || diffMap[1];
      animatronics.freddy.difficulty = diff.freddy;
      animatronics.bonnie.difficulty = diff.bonnie;
      animatronics.chica.difficulty = diff.chica;
      animatronics.foxy.difficulty = diff.foxy;

      // Hareket aralıklarını zorluğa göre ayarla (saniye)
      animatronics.freddy.moveInterval = Math.max(2.0, 5.0 - diff.freddy * 0.5);
      animatronics.bonnie.moveInterval = Math.max(1.5, 4.0 - diff.bonnie * 0.4);
      animatronics.chica.moveInterval = Math.max(1.8, 4.5 - diff.chica * 0.45);
      animatronics.foxy.moveInterval = Math.max(2.5, 6.0 - diff.foxy * 0.6);
    }

    function triggerJumpscare() {
      jumpscareOverlay.classList.add('active');
      // Jumpscare sesi (basit oscillator)
      playJumpscareSound();
      // Canvas'a korkunç bir yüz çiz
      const ctx = jumpscareCanvas.getContext('2d');
      jumpscareCanvas.style.display = 'block';
      jumpscareCanvas.width = 400;
      jumpscareCanvas.height = 400;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 400, 400);
      // Basit korkunç yüz
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(200, 200, 120, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(160, 170, 25, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(240, 170, 25, 0, Math.PI * 2);
      ctx.fill();
      // Ağız
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.ellipse(200, 260, 50, 30, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      for (let i = 0; i < 8; i++) {
        ctx.fillRect(170 + i * 8, 250, 5, 25);
      }

      // 3 saniye sonra menüye dön
      setTimeout(() => {
        jumpscareOverlay.classList.remove('active');
        jumpscareCanvas.style.display = 'none';
        mainMenu.style.display = 'flex';
        gameUI.classList.remove('active');
      }, 3000);
    }

    function playJumpscareSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const duration = 1.5;
        const sampleRate = audioCtx.sampleRate;
        const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          const t = i / sampleRate;
          // Gürültülü, rahatsız edici ses
          data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 3) * 0.8;
          data[i] += Math.sin(t * 150 * (1 + t * 10)) * 0.3 * Math.exp(-t * 2);
          data[i] += Math.sin(t * 80 * (1 - t)) * 0.2 * Math.exp(-t * 2.5);
        }
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start();
        setTimeout(() => audioCtx.close(), 2000);
      } catch (e) {
        // Ses çalınamazsa sessiz devam
      }
    }

    function playClickSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
        setTimeout(() => audioCtx.close(), 200);
      } catch (e) {}
    }

    function updateUI() {
      powerValue.textContent = power.toFixed(1) + '%';
      const powerEl = powerValue;
      powerEl.classList.remove('warning', 'danger');
      if (power <= 15) powerEl.classList.add('danger');
      else if (power <= 30) powerEl.classList.add('warning');

      // Zamanı göster
      const totalMinutes = Math.floor((elapsedGameTime / NIGHT_DURATION) * 360); // 0-360 dakika
      const displayHour = Math.floor(totalMinutes / 60); // 0-5 (12AM-5AM), 6 = 6AM
      const displayMin = totalMinutes % 60;
      let hourStr;
      if (displayHour === 0) hourStr = '12';
      else if (displayHour < 6) hourStr = displayHour.toString();
      else hourStr = '6';
      const ampm = (displayHour >= 6 && displayMin > 0) ? 'AM' : 'AM'; // Her zaman AM
      timeValue.textContent = `${hourStr}:${displayMin.toString().padStart(2, '0')} AM`;

      // Buton durumları
      doorLeftBtn.textContent = doorLeftClosed ? '🚪 KAPALI' : '🚪 AÇIK';
      doorLeftBtn.classList.toggle('door-closed', doorLeftClosed);
      doorRightBtn.textContent = doorRightClosed ? '🚪 KAPALI' : '🚪 AÇIK';
      doorRightBtn.classList.toggle('door-closed', doorRightClosed);
      lightLeftBtn.classList.toggle('light-on', lightLeftOn);
      lightRightBtn.classList.toggle('light-on', lightRightOn);
      openTabletBtn.classList.toggle('pressed', tabletOpen);
    }

    function updateAnimatronicVisibility() {
      // Animatroniklerin ofiste görünürlüğü
      // Bonnie sol kapıda pozisyon 5
      animatronics.bonnie.group.visible = (animatronics.bonnie.position === 5 && !doorLeftClosed);
      if (animatronics.bonnie.group.visible) {
        animatronics.bonnie.group.position.copy(leftDoorPos);
      }

      // Chica sağ kapıda pozisyon 5
      animatronics.chica.group.visible = (animatronics.chica.position === 5 && !doorRightClosed);
      if (animatronics.chica.group.visible) {
        animatronics.chica.group.position.copy(rightDoorPos);
      }

      // Freddy sağ kapıda pozisyon 6
      animatronics.freddy.group.visible = (animatronics.freddy.position === 6 && !doorRightClosed);
      if (animatronics.freddy.group.visible) {
        animatronics.freddy.group.position.copy(rightDoorPos);
      }

      // Foxy sol kapıda pozisyon 3 veya ofis içi pozisyon 4
      animatronics.foxy.group.visible = (animatronics.foxy.position >= 3 && animatronics.foxy.position <= 4);
      if (animatronics.foxy.position === 3 && !doorLeftClosed) {
        animatronics.foxy.group.position.copy(leftDoorPos);
      } else if (animatronics.foxy.position === 4) {
        animatronics.foxy.group.position.copy(officeCenter);
        // Foxy ofisteyse jumpscare!
        if (!doorLeftClosed && gameRunning) {
          endNight(false);
        }
      }

      // Kapı kapalıysa ve animatronik kapıdaysa, onları kapı arkasında gizle (görünmez)
      if (doorLeftClosed) {
        if (animatronics.bonnie.position === 5) animatronics.bonnie.group.visible = false;
        if (animatronics.foxy.position === 3) animatronics.foxy.group.visible = false;
      }
      if (doorRightClosed) {
        if (animatronics.chica.position === 5) animatronics.chica.group.visible = false;
        if (animatronics.freddy.position === 6) animatronics.freddy.group.visible = false;
      }

      // Işık yanıyorsa ve animatronik kapıdaysa görünürlüğü artır (zaten görünür)
      if (lightLeftOn && animatronics.bonnie.position === 5 && !doorLeftClosed) {
        animatronics.bonnie.group.visible = true;
      }
      if (lightRightOn && animatronics.chica.position === 5 && !doorRightClosed) {
        animatronics.chica.group.visible = true;
      }
    }

    // ==================== AI MANTIĞI ====================
    function moveAnimatronic(key) {
      const anim = animatronics[key];
      if (anim.position >= anim.maxPos) return; // Zaten ofiste

      // Hareket şansı: zorluk seviyesine göre
      const moveChance = 0.3 + anim.difficulty * 0.12;
      if (Math.random() < moveChance) {
        anim.position++;
        console.log(`${anim.name} yeni pozisyon: ${anim.position}`);
        
        // Foxy özel: pozisyon 3'ten 4'e atlayabilir (ofis içi)
        if (key === 'foxy' && anim.position === 4) {
          // Foxy ofise daldı!
          updateAnimatronicVisibility();
          if (!doorLeftClosed && gameRunning) {
            endNight(false);
            return;
          }
        }

        // Freddy kamerayla izlenmezse daha hızlı hareket eder
        if (key === 'freddy' && !tabletOpen) {
          // Tablet kapalıyken Freddy'nin hareket şansı artar
          if (Math.random() < 0.4) {
            anim.position++;
          }
        }

        // Kapıda animatronik varsa ve kapı açıksa jumpscare
        if ((key === 'bonnie' && anim.position === 5 && !doorLeftClosed) ||
            (key === 'chica' && anim.position === 5 && !doorRightClosed) ||
            (key === 'freddy' && anim.position === 6 && !doorRightClosed)) {
          updateAnimatronicVisibility();
          if (gameRunning) {
            setTimeout(() => {
              if (gameRunning && 
                  ((key === 'bonnie' && anim.position === 5 && !doorLeftClosed) ||
                   (key === 'chica' && anim.position === 5 && !doorRightClosed) ||
                   (key === 'freddy' && anim.position === 6 && !doorRightClosed))) {
                endNight(false);
              }
            }, 3000 + Math.random() * 5000); // 3-8 saniye içinde saldırı
          }
        }
      }
      updateAnimatronicVisibility();
      updateCameraIndicators();
    }

    function updateAI(deltaTime) {
      if (!gameRunning || gameOver || playerWon) return;

      Object.keys(animatronics).forEach(key => {
        const anim = animatronics[key];
        anim.moveTimer += deltaTime;
        if (anim.moveTimer >= anim.moveInterval) {
          anim.moveTimer = 0;
          moveAnimatronic(key);
        }
      });

      // Foxy'nin özel mekaniği: Korsan koyunda ne kadar az izlenirse o kadar hızlı ilerler
      // Basitleştirilmiş: tablet açıkken ve kamerada 1C izleniyorsa Foxy yavaşlar
      if (tabletOpen && cameras[currentCameraIndex].id === '1C') {
        animatronics.foxy.moveTimer -= deltaTime * 0.5; // İzleniyorsa geri sayar
      }
    }

    // ==================== GÜÇ TÜKETİMİ ====================
    function updatePowerConsumption(deltaTime) {
      if (!gameRunning || gameOver || playerWon) return;

      let consumptionRate = 0; // saniyede % güç tüketimi
      if (doorLeftClosed) consumptionRate += 1.2;
      if (doorRightClosed) consumptionRate += 1.2;
      if (lightLeftOn) consumptionRate += 0.8;
      if (lightRightOn) consumptionRate += 0.8;
      if (tabletOpen) consumptionRate += 0.9;
      // Baz tüketim
      consumptionRate += 0.3;

      power -= consumptionRate * deltaTime;
      if (power <= 0) {
        power = 0;
        // Güç bitince oyun biter, jumpscare olur
        endNight(false);
      }
      updateUI();
    }

    // ==================== ZAMAN İLERLEMESİ ====================
    function updateTime(deltaTime) {
      if (!gameRunning || gameOver || playerWon) return;
      elapsedGameTime += deltaTime;
      if (elapsedGameTime >= NIGHT_DURATION) {
        elapsedGameTime = NIGHT_DURATION;
        endNight(true);
      }
      updateUI();
    }

            doorLeftClosed = !doorLeftClosed;
            const lp = office.getObjectByName('leftDoorPanel');
            if (lp) lp.position.y = doorLeftClosed ? -1.5 : 1.15;
            playClickSound();
            break;
          case 'd':
            doorRightClosed = !doorRightClosed;
            const rp = office.getObjectByName('rightDoorPanel');
            if (rp) rp.position.y = doorRightClosed ? -1.5 : 1.15;
            playClickSound();
            break;
          case 'q':
            lightLeftOn = true;
            leftDoorLight.visible = true;
            break;
          case 'e':
            lightRightOn = true;
            rightDoorLight.visible = true;
            break;
          case ' ':
            e.preventDefault();
            tabletOpen = !tabletOpen;
            if (tabletOpen) {
              tabletOverlay.classList.add('active');
              updateCameraIndicators();
            } else {
              tabletOverlay.classList.remove('active');
            }
            playClickSound();
            break;
          default: break;
        }
        updateUI();
        updateAnimatronicVisibility();
      });

      window.addEventListener('keyup', (e) => {
        if (e.key.toLowerCase() === 'q') {
          lightLeftOn = false;
          leftDoorLight.visible = false;
        }
        if (e.key.toLowerCase() === 'e') {
          lightRightOn = false;
          rightDoorLight.visible = false;
        }
        updateUI();
        updateAnimatronicVisibility();
      });
    }

    // ==================== ANA OYUN DÖNGÜSÜ ====================
    function gameLoop(timestamp) {
      requestAnimationFrame(gameLoop);

      if (lastTimestamp === 0) lastTimestamp = timestamp;
      let deltaTime = (timestamp - lastTimestamp) / 1000;
      if (deltaTime > 0.1) deltaTime = 0.1; // Maksimum delta sınırı
      lastTimestamp = timestamp;

      if (gameRunning && !gameOver && !playerWon && !tabletOpen) {
        // Sadece ofis görünümündeyken AI ve güç güncellenir
        updateAI(deltaTime);
        updatePowerConsumption(deltaTime);
        updateTime(deltaTime);
      } else if (gameRunning && !gameOver && !playerWon && tabletOpen) {
        // Tablet açıkken AI yavaşlar ama güç tüketimi devam eder
        updateAI(deltaTime * 0.3);
        updatePowerConsumption(deltaTime);
        updateTime(deltaTime);
        updateCameraIndicators();
      }

      // Sürekli UI güncelle (güç ve zaman)
      if (gameRunning) {
        updateUI();
      }

      // Three.js render
      renderer.render(scene, camera);
    }

    // ==================== BAŞLANGIÇ ====================
    function init() {
      buildCameraGrid();
      setupEventListeners();
      resetGameState();
      // Başlangıçta tüm animatronikleri gizle
      Object.keys(animatronics).forEach(key => {
        animatronics[key].group.visible = false;
      });
      // Işıklar kapalı
      leftDoorLight.visible = false;
      rightDoorLight.visible = false;
      // Menü göster
      mainMenu.style.display = 'flex';
      gameUI.classList.remove('active');
      // Oyun döngüsünü başlat
      requestAnimationFrame(gameLoop);
    }

    init();

    console.log('OsNaf başlatıldı! Modellerinizi "modeller/" klasörüne .glb olarak yerleştirin.');
    console.log('Desteklenen model dosyaları: freddy.glb, bonnie.glb, chica.glb, foxy.glb');
  </script>
