<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsNaf 3D - Five Nights at Osman's</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* 3D Render Alanı */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Arayüz Katmanı */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Tıklamalar arkaya, 3D dünyaya geçsin */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .ui-top {
            display: flex;
            justify-content: space-between;
            font-size: 28px;
            text-shadow: 3px 3px #000;
        }

        .power-danger {
            color: #ff3333;
            animation: blink 1s infinite;
        }

        /* İnteraktif Butonlar (Pointer events aktif) */
        .interactive-hud {
            pointer-events: auto;
        }

        .door-controls {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #left-controls { left: 40px; }
        #right-controls { right: 40px; }

        .btn {
            width: 80px;
            height: 60px;
            border: 4px solid #444;
            background: #222;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-family: inherit;
            box-shadow: 0 5px 0 #000;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .btn-door.active { background: #ff2222; border-color: #770000; }
        .btn-light.active { background: #ffff22; color: #000; border-color: #777700; }

        /* Kamera Monitörü Tetikleyici */
        #camera-trigger {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.2s;
        }
        #camera-trigger:hover { background: rgba(255, 255, 255, 0.4); }

        /* Kamera Ekranı */
        #camera-monitor {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 20;
            display: none;
            pointer-events: auto;
        }

        .static-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uBYSzZssw/giphy.gif') repeat;
            opacity: 0.12;
            pointer-events: none;
        }

        .cam-map {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 260px;
            height: 200px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #fff;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .cam-btn {
            background: #111;
            border: 2px solid #fff;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }
        .cam-btn.active { background: #00ff00; color: #000; font-weight: bold; }

        .cam-label {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 36px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-left: 8px solid #00ff00;
        }

        /* Ekranlar */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            display: none;
        }

        #jumpscare-screen {
            background: #0a0000;
            color: #ff0000;
            font-size: 70px;
            font-weight: bold;
        }
        .scare-anim { animation: shake 0.05s infinite; }

        @keyframes shake {
            0% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-3px, -2px) rotate(1deg); }
            100% { transform: translate(2px, -3px) rotate(-1deg); }
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
    <!-- Three.js Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- 3D Render Alanı -->
    <div id="canvas-container"></div>

    <!-- 2D HUD / ARAYÜZ -->
    <div class="ui-layer">
        <div class="ui-top">
            <div>GÜÇ: <span id="power-display">100</span>% (Kullanım: <span id="usage-display">1</span>)</div>
            <div>SAAT: <span id="time-display">12</span> AM</div>
        </div>

        <!-- Sol Kapı Kontrolleri -->
        <div class="door-controls interactive-hud" id="left-controls">
            <button class="btn btn-door" id="btn-left-door" onclick="toggleLeftDoor()">KAPI</button>
            <button class="btn btn-light" id="btn-left-light" onclick="toggleLeftLight()">IŞIK</button>
        </div>

        <!-- Sağ Kapı Kontrolleri -->
        <div class="door-controls interactive-hud" id="right-controls">
            <button class="btn btn-door" id="btn-right-door" onclick="toggleRightDoor()">KAPI</button>
            <button class="btn btn-light" id="btn-right-light" onclick="toggleRightLight()">IŞIK</button>
        </div>

        <!-- Kamera Monitör Butonu -->
        <button id="camera-trigger" class="interactive-hud" onclick="toggleMonitor()"></button>
    </div>

    <!-- KAMERA MONİTÖRÜ EKRANI -->
    <div id="camera-monitor">
        <div class="static-effect"></div>
        <div class="cam-label" id="cam-title">CAM 1A</div>
        <div id="cam-view-text" style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:24px; text-align:center; color:#aaa;"></div>
        
        <div class="cam-map">
            <button class="cam-btn active" onclick="switchCamera('1A')">CAM 1A (Sahne)</button>
            <button class="cam-btn" onclick="switchCamera('1B')">CAM 1B (Koridor)</button>
            <button class="cam-btn" onclick="switchCamera('2A')">CAM 2A (Sol Eşik)</button>
            <button class="cam-btn" onclick="switchCamera('2B')">CAM 2B (Sağ Eşik)</button>
        </div>
    </div>

    <!-- JUMPSCARE EKRANI -->
    <div id="jumpscare-screen" class="screen">
        <div class="scare-anim">🐻 OSNAF YAKALADI! 🐻</div>
        <div style="font-size: 24px; color: white; margin-top: 30px; cursor: pointer;" onclick="location.reload()">YENİDEN DENE</div>
    </div>

    <!-- KAZANMA EKRANI -->
    <div id="win-screen" class="screen">
        <h1 style="color: #00ff00; font-size: 60px;">6 AM</h1>
        <p style="font-size: 24px; margin-top: 15px;">Tebrikler! Güvendesin.</p>
        <div style="font-size: 20px; color: #aaa; margin-top: 30px; cursor: pointer;" onclick="location.reload()">TEKRAR OYNA</div>
    </div>

    <script>
        // --- OYUN DEĞİŞKENLERİ ---
        let power = 100, usage = 1, time = 0, gameActive = true;
        let leftDoorClosed = false, leftLightOn = false;
        let rightDoorClosed = false, rightLightOn = false;
        let monitorOpen = false, currentCam = '1A';
        
        // Robot Konumu: '1A', '1B', '2A' (Sol Kapı Önü), '2B' (Sağ Kapı Önü), 'ATTACK'
        let robotPos = '1A';

        // --- THREE.JS BİLEŞENLERİ ---
        let scene, camera, renderer;
        let officeRoom, desk;
        let leftDoorMesh, rightDoorMesh;
        let mainLight, leftOfficeLight, rightOfficeLight;
        let jumpscareRobot;

        // Fare Hareket Takibi (Sağa sola bakma için)
        let targetRotationY = 0;
        let mouseX = 0;

        init3D();
        setupGameLogic();
        animate();

        function init3D() {
            const container = document.getElementById('canvas-container');
            
            // Sahne ve Kamera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.08);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0); // Oyuncu odanın merkezinde

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // --- 3D MODELLEME (KODLA) ---
            
            // 1. Ofis Duvarları (Ters Çevrilmiş Büyük Küp)
            const roomGeo = new THREE.BoxGeometry(16, 8, 12);
            const roomMat = new THREE.MeshStandardMaterial({ color: 0x1f1f1f, side: THREE.BackSide, roughness: 0.8 });
            officeRoom = new THREE.Mesh(roomGeo, roomMat);
            scene.add(officeRoom);

            // 2. Masa (Oyuncunun Önünde)
            const deskGeo = new THREE.BoxGeometry(6, 0.2, 2.5);
            const deskMat = new THREE.MeshStandardMaterial({ color: 0x3a2212, roughness: 0.6 });
            desk = new THREE.Mesh(deskGeo, deskMat);
            desk.position.set(0, -1.5, -3.5);
            scene.add(desk);

            const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 2);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x111 });
            let leg1 = new THREE.Mesh(legGeo, legMat); leg1.position.set(-2.8, -2.5, -4.5); scene.add(leg1);
            let leg2 = new THREE.Mesh(legGeo, legMat); leg2.position.set(2.8, -2.5, -4.5); scene.add(leg2);

            // 3. Sol ve Sağ Kapı Boşlukları/Kapıları
            const doorGeo = new THREE.BoxGeometry(0.2, 5, 3.5);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5, roughness: 0.5 });
            
            leftDoorMesh = new THREE.Mesh(doorGeo, doorMat);
            leftDoorMesh.position.set(-7.9, 1, 0); // Yüksekte başlıyor (Açık)
            scene.add(leftDoorMesh);

            rightDoorMesh = new THREE.Mesh(doorGeo, doorMat);
            rightDoorMesh.position.set(7.9, 1, 0); // Yüksekte başlıyor
            scene.add(rightDoorMesh);

            // 4. Jumpscare İçin Gizli Bekleyen Robot Model Tasarımı
            const botGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 1.5), new THREE.MeshStandardMaterial({color: 0x554433}));
            body.position.y = 0;
            const head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0x554433}));
            head.position.y = 1.6;
            const eyeMat = new THREE.MeshBasicMaterial({color: 0xff0000});
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.15), eyeMat); eyeL.position.set(0.3, 1.7, 0.5);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.15), eyeMat); eyeR.position.set(-0.3, 1.7, 0.5);
            botGroup.add(body, head, eyeL, eyeR);
            
            jumpscareRobot = botGroup;
            jumpscareRobot.position.set(0, -1, -2.5); // Önümüzde gizli
            jumpscareRobot.visible = false;
            scene.add(jumpscareRobot);

            // --- AYDINLATMA ---
            // Oda Tavan Işığı (Genel Loşluk)
            mainLight = new THREE.PointLight(0xffffff, 0.2, 20);
            mainLight.position.set(0, 3, -2);
            scene.add(mainLight);

            // Sol ve Sağ Kapı Işıkları (Varsayılan olarak kapalı/şiddeti 0)
            leftOfficeLight = new THREE.PointLight(0xffffaa, 0, 10);
            leftOfficeLight.position.set(-7, 1, 0);
            scene.add(leftOfficeLight);

            rightOfficeLight = new THREE.PointLight(0xffffaa, 0, 10);
            rightOfficeLight.position.set(7, 1, 0);
            scene.add(rightOfficeLight);

            // Fare Dinleyicisi
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onWindowResize);
        }

        // Fare Hareketine Göre Sağa Sola Dönüş Algoritması
        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            // Ekrana göre kameranın dönebileceği maksimum radyan açısı
            targetRotationY = -mouseX * 1.1; 
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- BUTON FONKSİYONLARI ---
        function toggleLeftDoor() {
            if (!gameActive || power <= 0) return;
            leftDoorClosed = !leftDoorClosed;
            document.getElementById('btn-left-door').classList.toggle('active', leftDoorClosed);
        }

        function toggleLeftLight() {
            if (!gameActive || power <= 0) return;
            leftLightOn = !leftLightOn;
            document.getElementById('btn-left-light').classList.toggle('active', leftLightOn);
            leftOfficeLight.intensity = leftLightOn ? 2.5 : 0;
        }

        function toggleRightDoor() {
            if (!gameActive || power <= 0) return;
            rightDoorClosed = !rightDoorClosed;
            document.getElementById('btn-right-door').classList.toggle('active', rightDoorClosed);
        }

        function toggleRightLight() {
            if (!gameActive || power <= 0) return;
            rightLightOn = !rightLightOn;
            document.getElementById('btn-right-light').classList.toggle('active', rightLightOn);
            rightOfficeLight.intensity = rightLightOn ? 2.5 : 0;
        }

        function toggleMonitor() {
            if (!gameActive || power <= 0) return;
            monitorOpen = !monitorOpen;
            document.getElementById('camera-monitor').style.display = monitorOpen ? 'block' : 'none';
            updateCameraViewText();
        }

        function switchCamera(cam) {
            currentCam = cam;
            document.getElementById('cam-title').innerText = "CAM " + cam;
            document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateCameraViewText();
        }

        function updateCameraViewText() {
            const txt = document.getElementById('cam-view-text');
            if (robotPos === currentCam) {
                txt.innerHTML = "<span style='color:#ff2222; font-weight:bold;'>⚠️ ANALİZ:</span> Bir silüet hareket ediyor... Gözleri parlıyor!";
            } else {
                txt.innerHTML = "Sinyal Aktif. Bölge temiz görünüyor.";
            }
        }

        // --- OYUN MANTIĞI VE YAPAY ZEKA ---
        function setupGameLogic() {
            // Güç tüketimi ve döngüler
            setInterval(() => {
                if (!gameActive) return;

                let currentUsage = 1;
                if (leftDoorClosed) currentUsage++;
                if (rightDoorClosed) currentUsage++;
                if (leftLightOn) currentUsage++;
                if (rightLightOn) currentUsage++;
                if (monitorOpen) currentUsage++;

                usage = currentUsage;
                document.getElementById('usage-display').innerText = usage;

                power -= (usage * 0.4);
                if (power <= 0) {
                    power = 0;
                    triggerPowerOut();
                }
                document.getElementById('power-display').innerText = Math.floor(power);
                if(power < 20) document.getElementById('power-display').parentElement.classList.add('power-danger');

            }, 1000);

            // Saat sistemi (Her 40 saniyede bir saat ilerler)
            setInterval(() => {
                if (!gameActive) return;
                time++;
                if (time === 6) {
                    gameActive = false;
                    document.getElementById('win-screen').style.display = 'flex';
                } else {
                    document.getElementById('time-display').innerText = time;
                }
            }, 40000);

            // Yapay Zeka Hareketi (Her 8 saniyede bir yer değiştirme şansı)
            setInterval(() => {
                if (!gameActive) return;

                if (robotPos === '1A') {
                    robotPos = '1B';
                } else if (robotPos === '1B') {
                    // Rastgele sol veya sağ eşiğe yönelir
                    robotPos = Math.random() > 0.5 ? '2A' : '2B';
                } else if (robotPos === '2A') {
                    // Sol Kapı Kontrolü
                    if (leftDoorClosed) {
                        robotPos = '1A'; // Püskürtüldü, sahneye geri gitti
                    } else {
                        triggerJumpscare();
                    }
                } else if (robotPos === '2B') {
                    // Sağ Kapı Kontrolü
                    if (rightDoorClosed) {
                        robotPos = '1A';
                    } else {
                        triggerJumpscare();
                    }
                }
                updateCameraViewText();
            }, 8000);
        }

        function triggerPowerOut() {
            gameActive = false;
            leftDoorClosed = false; rightDoorClosed = false;
            leftLightOn = false; rightLightOn = false;
            monitorOpen = false;
            document.getElementById('camera-monitor').style.display = 'none';
            mainLight.intensity = 0;
            leftOfficeLight.intensity = 0;
            rightOfficeLight.intensity = 0;

            setTimeout(() => {
                triggerJumpscare();
            }, 3500);
        }

        function triggerJumpscare() {
            gameActive = false;
            monitorOpen = false;
            document.getElementById('camera-monitor').style.display = 'none';
            
            // 3D robotu önümüze getir ve görünür yap
            jumpscareRobot.visible = true;
            mainLight.intensity = 3; // Korkunç parlak flaş efekti
            mainLight.color.setHex(0xff0000);

            document.getElementById('jumpscare-screen').style.display = 'flex';
        }

        // --- RENDER DÖNGÜSÜ (ANIMATION LOOP) ---
        function animate() {
            requestAnimationFrame(animate);

            if (gameActive) {
                // Kameranın fareyi yumuşak takip etmesi (Lerp)
                camera.rotation.y += (targetRotationY - camera.rotation.y) * 0.08;
            }

            // 3D Kapıların Kapanma/Açılma Animasyonu
            // Kapanınca Y ekseninde aşağı (-1.5), açılınca yukarı (1.5) kayar
            const targetLeftY = leftDoorClosed ? -1.5 : 2.5;
            leftDoorMesh.position.y += (targetLeftY - leftDoorMesh.position.y) * 0.2;

            const targetRightY = rightDoorClosed ? -1.5 : 2.5;
            rightDoorMesh.position.y += (targetRightY - rightDoorMesh.position.y) * 0.2;

            // Eğer jumpscare tetiklendiyse robot oyuncuya doğru sarsılarak büyüsün/yaklaşsın
            if (jumpscareRobot.visible) {
                jumpscareRobot.position.z += (0 - jumpscareRobot.position.z) * 0.2;
                jumpscareRobot.rotation.z = Math.sin(Date.now() * 0.05) * 0.2;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
