<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
  <title>OsNaf - Five Nights at Freddy's Web</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0; overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      background: #000;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    /* Yükleme Ekranı */
    #loadingScreen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0a; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-family: 'Press Start 2P', monospace; text-shadow: 0 0 15px #ff0000;
    }
    #loadingScreen h2 { font-size: 2em; margin-bottom: 30px; animation: flicker 2s infinite; color: #ff4444; }
    .progress-bar-container { width: 60%; max-width: 500px; height: 30px; background: #222; border: 2px solid #ff0000; border-radius: 5px; overflow: hidden; }
    .progress-bar-fill { height: 100%; width: 0%; background: #ff0000; box-shadow: 0 0 20px #ff0000; transition: width 0.3s; }
    .progress-text { margin-top: 15px; font-size: 0.8em; color: #ff6666; }
    /* Ana Menü */
    #mainMenu {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, #1a0a0a 0%, #000 90%); z-index: 100;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; text-shadow: 0 0 15px #ff0000;
    }
    #mainMenu.active { display: flex; }
    #mainMenu h1 { font-size: 4em; margin: 0; letter-spacing: 8px; animation: flicker 2s infinite; color: #ff4444; }
    @keyframes flicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:1} 20%,24%,55%{opacity:0.3} }
    .subtitle { font-size: 0.9em; margin-bottom: 50px; color: #aaa; letter-spacing: 4px; }
    .night-select { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
    .night-btn {
      font-family: 'Press Start 2P', monospace; font-size: 1.2em; padding: 20px 30px;
      background: #111; color: #ff6666; border: 2px solid #ff0000; cursor: pointer;
      transition: all 0.3s; text-shadow: 0 0 10px #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }
    .night-btn:hover { background: #330000; box-shadow: 0 0 30px #ff0000; transform: scale(1.05); color: #fff; }
    .night-btn:active { transform: scale(0.95); }
    /* Oyun UI */
    #gameUI {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
      pointer-events: none; display: none;
    }
    #gameUI.active { display: block; }
    #topBar {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 30px; align-items: center; background: rgba(0,0,0,0.8);
      padding: 10px 20px; border: 2px solid #333; border-radius: 5px; color: #fff;
      font-size: 0.9em; pointer-events: auto;
    }
    .power-indicator { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
    .power-indicator.warning { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
    .power-indicator.danger { color: #ff0000; text-shadow: 0 0 15px #ff0000; animation: blink 0.5s infinite; }
    @keyframes blink { 50%{opacity:0.3} }
    .time-indicator { color: #ffffff; font-size: 1.2em; }
    #bottomControls {
      position: absolute; bottom: 20px; left: 0; width: 100%;
      display: flex; justify-content: space-between; padding: 0 5%; box-sizing: border-box; pointer-events: auto;
    }
    .door-control { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .ctrl-btn {
      font-family: 'Press Start 2P', monospace; font-size: 0.65em; padding: 12px 15px;
      background: rgba(20,20,20,0.9); color: #ccc; border: 2px solid #555; cursor: pointer;
      transition: all 0.2s; pointer-events: auto; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px;
    }
    .ctrl-btn:active, .ctrl-btn.pressed { background: #444; border-color: #fff; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
    .ctrl-btn.door-closed { background: #550000; border-color: #ff0000; color: #ff4444; box-shadow: 0 0 20px rgba(255,0,0,0.6); }
    .ctrl-btn.light-on { background: #444400; border-color: #ffff00; color: #ffff00; box-shadow: 0 0 20px rgba(255,255,0,0.5); }
    /* Tablet */
    #tabletOverlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 85%; max-width: 800px; aspect-ratio: 4/3; background: #111; border: 6px solid #444;
      border-radius: 10px; display: none; z-index: 20; pointer-events: auto; flex-direction: column;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }
    #tabletOverlay.active { display: flex; }
    #tabletHeader { background: #222; padding: 8px; text-align: center; color: #fff; font-size: 0.6em; border-bottom: 2px solid #555; }
    #cameraGrid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 3px; padding: 8px; flex: 1; background: #0a0a0a; }
    .cam-cell { background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.45em; cursor: pointer; transition: all 0.2s; position: relative; text-align: center; padding: 3px; }
    .cam-cell:hover { border-color: #888; background: #222; }
    .cam-cell.selected { border: 2px solid #00ff00; box-shadow: 0 0 10px #00ff00; color: #fff; }
    .cam-cell .anim-indicator { position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-radius: 50%; background: #ff0000; box-shadow: 0 0 6px #ff0000; display: none; }
    .cam-cell .anim-indicator.visible { display: block; }
    #tabletClose { font-family: 'Press Start 2P', monospace; background: #550000; color: #fff; border: none; padding: 12px; cursor: pointer; font-size: 0.65em; letter-spacing: 1px; border-top: 2px solid #555; border-radius: 0 0 8px 8px; }
    /* Jumpscare */
    #jumpscareOverlay { position: absolute; top:0; left:0; width:100%; height:100%; z-index:50; display:none; background:#000; justify-content:center; align-items:center; flex-direction:column; }
    #jumpscareOverlay.active { display:flex; }
    #jumpscareCanvas { max-width:90%; max-height:90%; animation:shake 0.15s infinite; }
    @keyframes shake { 0%{transform:translate(2px,0)rotate(0.5deg)} 25%{transform:translate(-3px,2px)rotate(-0.5deg)} 50%{transform:translate(1px,-2px)rotate(0.3deg)} 75%{transform:translate(-2px,-1px)rotate(-0.3deg)} 100%{transform:translate(2px,1px)rotate(0.5deg)} }
    .gameover-text { color:#ff0000; font-size:2em; margin-top:30px; text-shadow:0 0 30px #ff0000; animation:blink 0.3s infinite; }
    /* Kazanma */
    #winOverlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:60; background:radial-gradient(circle,#111 0%,#000 90%); display:none; flex-direction:column; align-items:center; justify-content:center; color:#ffdd00; }
    #winOverlay.active { display:flex; }
    #winOverlay h2 { font-size:2.5em; text-shadow:0 0 30px #ffdd00; }
    #backToMenu { font-family:'Press Start 2P',monospace; font-size:0.9em; margin-top:40px; padding:15px 30px; background:#222; color:#ffdd00; border:2px solid #ffdd00; cursor:pointer; }
    /* Uçuş modu butonu */
    #droneBtn {
      position: absolute; top: 20px; right: 20px; z-index: 30; pointer-events: auto;
      font-family: 'Press Start 2P', monospace; font-size: 0.7em; padding: 12px;
      background: rgba(0,0,0,0.8); color: #0ff; border: 2px solid #0ff; border-radius: 8px;
      cursor: pointer; display: none;
    }
    #droneBtn.active { background: #033; color: #fff; border-color: #fff; }
    /* Joystick */
    #joystickContainer {
      position: absolute; bottom: 120px; left: 30px; width: 120px; height: 120px;
      z-index: 35; pointer-events: auto; display: none;
    }
    #joystickBase {
      width: 100%; height: 100%; border-radius: 50%; background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3); position: relative;
    }
    #joystickThumb {
      position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
      background: rgba(255,255,255,0.4); border-radius: 50%;
      transform: translate(-50%, -50%); pointer-events: none;
    }
    #lookArea {
      position: absolute; top: 0; right: 0; width: 50%; height: 100%;
      z-index: 34; pointer-events: auto; display: none;
    }
    /* Koordinat göstergesi */
    #coordDisplay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.9); font-family: monospace; font-size: 1em;
      z-index: 36; pointer-events: none; display: none; text-shadow: 1px 1px 3px black;
      background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="loadingScreen">
    <h2>OsNaf Yükleniyor...</h2>
    <div class="progress-bar-container"><div id="progressFill" class="progress-bar-fill" style="width:0%"></div></div>
    <p id="progressText" class="progress-text">%0</p>
  </div>

  <div id="mainMenu">
    <h1>OsNaf</h1>
    <p class="subtitle">Beş Gece. Hayatta Kal.</p>
    <div class="night-select">
      <button class="night-btn" data-night="1">Gece 1</button>
      <button class="night-btn" data-night="2">Gece 2</button>
      <button class="night-btn" data-night="3">Gece 3</button>
      <button class="night-btn" data-night="4">Gece 4</button>
      <button class="night-btn" data-night="5">Gece 5</button>
    </div>
  </div>

  <div id="gameUI">
    <div id="topBar">
      <span>Güç: <span id="powerValue" class="power-indicator">100.0%</span></span>
      <span id="timeValue" class="time-indicator">12:00 AM</span>
    </div>
    <div id="bottomControls">
      <div class="door-control">
        <button id="lightLeft" class="ctrl-btn">🔦 Işık</button>
        <button id="doorLeft" class="ctrl-btn">🚪 Kapı</button>
      </div>
      <button id="openTablet" class="ctrl-btn" style="align-self:center; padding:15px 20px; font-size:0.7em;">📹 Kamera</button>
      <div class="door-control">
        <button id="lightRight" class="ctrl-btn">🔦 Işık</button>
        <button id="doorRight" class="ctrl-btn">🚪 Kapı</button>
      </div>
    </div>
  </div>

  <div id="tabletOverlay">
    <div id="tabletHeader">GÜVENLİK KAMERALARI - <span id="currentCamLabel">Kamera 1A</span></div>
    <div id="cameraGrid"></div>
    <button id="tabletClose">TABLETİ KAPAT</button>
  </div>

  <div id="jumpscareOverlay">
    <canvas id="jumpscareCanvas" width="400" height="400"></canvas>
    <div class="gameover-text">GAME OVER</div>
  </div>

  <div id="winOverlay">
    <h2>5:59 AM</h2>
    <p style="font-size:1.5em;">Hayatta Kaldın!</p>
    <button id="backToMenu">Menüye Dön</button>
  </div>

  <button id="droneBtn">🚁 UÇUŞ</button>
  <div id="joystickContainer">
    <div id="joystickBase">
      <div id="joystickThumb"></div>
    </div>
  </div>
  <div id="lookArea"></div>
  <div id="coordDisplay">X: 0.0 Y: 0.0 Z: 0.0</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ==================== DOM ====================
    const loadingScreen = document.getElementById('loadingScreen');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const mainMenu = document.getElementById('mainMenu');
    const gameUI = document.getElementById('gameUI');
    const powerValue = document.getElementById('powerValue');
    const timeValue = document.getElementById('timeValue');
    const tabletOverlay = document.getElementById('tabletOverlay');
    const cameraGrid = document.getElementById('cameraGrid');
    const currentCamLabel = document.getElementById('currentCamLabel');
    const jumpscareOverlay = document.getElementById('jumpscareOverlay');
    const jumpscareCanvas = document.getElementById('jumpscareCanvas');
    const winOverlay = document.getElementById('winOverlay');
    const backToMenuBtn = document.getElementById('backToMenu');
    const droneBtn = document.getElementById('droneBtn');
    const joystickContainer = document.getElementById('joystickContainer');
    const joystickBase = document.getElementById('joystickBase');
    const joystickThumb = document.getElementById('joystickThumb');
    const lookArea = document.getElementById('lookArea');
    const coordDisplay = document.getElementById('coordDisplay');

    const doorLeftBtn = document.getElementById('doorLeft');
    const doorRightBtn = document.getElementById('doorRight');
    const lightLeftBtn = document.getElementById('lightLeft');
    const lightRightBtn = document.getElementById('lightRight');
    const openTabletBtn = document.getElementById('openTablet');
    const closeTabletBtn = document.getElementById('tabletClose');

    // ==================== OYUN DEĞİŞKENLERİ ====================
    let currentNight = 1;
    let power = 100.0;
    let elapsedGameTime = 0;
    let gameRunning = false, gameOver = false, playerWon = false;
    let doorLeftClosed = false, doorRightClosed = false;
    let lightLeftOn = false, lightRightOn = false;
    let tabletOpen = false;
    let lastTimestamp = 0;
    const NIGHT_DURATION = 360;

    const animatronics = {
      freddy: { name:'Freddy', position:0, maxPos:6, difficulty:0, moveTimer:0, moveInterval:5.0, model:null, group:new THREE.Group() },
      bonnie: { name:'Bonnie', position:0, maxPos:5, difficulty:0, moveTimer:0, moveInterval:4.0, model:null, group:new THREE.Group() },
      chica:  { name:'Chica',  position:0, maxPos:5, difficulty:0, moveTimer:0, moveInterval:4.5, model:null, group:new THREE.Group() },
      foxy:   { name:'Foxy',   position:0, maxPos:4, difficulty:0, moveTimer:0, moveInterval:6.0, model:null, group:new THREE.Group() }
    };

    const cameras = [
      { id:'1A', label:'Sahne (1A)', row:0, col:0 }, { id:'1B', label:'Yemek Alanı (1B)', row:0, col:1 },
      { id:'1C', label:'Korsan Koyu (1C)', row:0, col:2 }, { id:'2A', label:'Batı Koridor (2A)', row:1, col:0 },
      { id:'2B', label:'Batı Salon (2B)', row:1, col:1 }, { id:'3', label:'Depo (3)', row:1, col:2 },
      { id:'4A', label:'Doğu Koridor (4A)', row:2, col:0 }, { id:'4B', label:'Doğu Salon (4B)', row:2, col:1 },
      { id:'5', label:'Arka Oda (5)', row:2, col:2 }, { id:'6', label:'Mutfak (6)', row:3, col:0 },
      { id:'7', label:'Tuvaletler (7)', row:3, col:1 }
    ];
    let currentCameraIndex = 0;

    // ==================== THREE.JS ====================
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2; // genel parlaklık artışı

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 10, 50);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 60);
    camera.position.set(0, 1.7, 0.8);
    camera.lookAt(0, 1.5, -2);

    // Ortam ışığı - normalden biraz daha fazla
    const ambientLight = new THREE.AmbientLight(0x446688, 0.6);
    scene.add(ambientLight);
    
    const overheadLight = new THREE.PointLight(0x667788, 6, 20);
    overheadLight.position.set(0, 3.5, -1);
    overheadLight.castShadow = true;
    scene.add(overheadLight);

    const leftDoorLight = new THREE.SpotLight(0xffeedd, 10, 15, Math.PI/6, 0.3, 1);
    leftDoorLight.position.set(-4,1.5,-2); leftDoorLight.target.position.set(-4,0.5,-5);
    leftDoorLight.visible = false; scene.add(leftDoorLight); scene.add(leftDoorLight.target);

    const rightDoorLight = new THREE.SpotLight(0xffeedd, 10, 15, Math.PI/6, 0.3, 1);
    rightDoorLight.position.set(4,1.5,-2); rightDoorLight.target.position.set(4,0.5,-5);
    rightDoorLight.visible = false; scene.add(rightDoorLight); scene.add(rightDoorLight.target);

    // Uçuş modu için ekstra güçlü ışıklar (kameraya bağlı)
    const droneAmbient = new THREE.AmbientLight(0xffffff, 1.2); // ortam ışığını iki katına çıkar
    droneAmbient.visible = false;
    camera.add(droneAmbient);

    const dronePointLight = new THREE.PointLight(0xffffff, 15, 40);
    dronePointLight.position.set(0, 0, 0);
    dronePointLight.visible = false;
    camera.add(dronePointLight);

    const droneSpotLight = new THREE.SpotLight(0xffffff, 30, 60, Math.PI/4, 0.1, 0.3);
    droneSpotLight.position.set(0, 0, 0);
    droneSpotLight.target.position.set(0, 0, -15);
    droneSpotLight.visible = false;
    camera.add(droneSpotLight);
    camera.add(droneSpotLight.target);

    // Ayrıca sahneye genel bir dolgu ışığı (uçuş modunda aktif olur)
    const fillLight = new THREE.PointLight(0xccddff, 10, 50);
    fillLight.position.set(0, 5, 5);
    fillLight.visible = false;
    scene.add(fillLight);

    let leftDoorPanel, rightDoorPanel;
    function createSimpleDoorPanels() {
      const geo = new THREE.BoxGeometry(0.15,2.3,1.0);
      const mat = new THREE.MeshStandardMaterial({color:0x444444, metalness:0.6, roughness:0.4});
      leftDoorPanel = new THREE.Mesh(geo, mat); leftDoorPanel.position.set(-4,1.15,-3.5); leftDoorPanel.name='leftDoorPanel'; scene.add(leftDoorPanel);
      rightDoorPanel = new THREE.Mesh(geo, mat); rightDoorPanel.position.set(4,1.15,-3.5); rightDoorPanel.name='rightDoorPanel'; scene.add(rightDoorPanel);
    }

    // ==================== UÇUŞ MODU (JOYSTICK) ====================
    let flyMode = false;
    const flySpeed = 4.0;
    let joystickActive = false;
    let joystickVector = new THREE.Vector2(0,0);
    let lookDelta = new THREE.Vector2(0,0);
    const euler = new THREE.Euler(0,0,0,'YXZ');
    let lastLookTouch = null;

    function setFlyMode(active) {
      flyMode = active;
      droneBtn.classList.toggle('active', active);
      joystickContainer.style.display = active ? 'block' : 'none';
      lookArea.style.display = active ? 'block' : 'none';
      coordDisplay.style.display = active ? 'block' : 'none';
      
      // Tüm ekstra ışıkları aç/kapat
      droneAmbient.visible = active;
      dronePointLight.visible = active;
      droneSpotLight.visible = active;
      fillLight.visible = active;

      // Normal ortam ışığını biraz kıs, çünkü droneAmbient zaten basacak
      ambientLight.intensity = active ? 0.3 : 0.6;
      
      if (active) {
        euler.setFromQuaternion(camera.quaternion);
        joystickVector.set(0,0);
        joystickThumb.style.transform = 'translate(-50%, -50%)';
      }
    }

    joystickBase.addEventListener('touchstart', (e) => {
      e.preventDefault();
      joystickActive = true;
      updateJoystick(e.touches[0]);
    });
    joystickBase.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (joystickActive) updateJoystick(e.touches[0]);
    });
    joystickBase.addEventListener('touchend', (e) => {
      e.preventDefault();
      joystickActive = false;
      joystickVector.set(0,0);
      joystickThumb.style.transform = 'translate(-50%, -50%)';
    });
    joystickBase.addEventListener('touchcancel', () => {
      joystickActive = false;
      joystickVector.set(0,0);
      joystickThumb.style.transform = 'translate(-50%, -50%)';
    });

    function updateJoystick(touch) {
      const rect = joystickBase.getBoundingClientRect();
      const centerX = rect.left + rect.width/2;
      const centerY = rect.top + rect.height/2;
      const maxDist = rect.width/2 - 20;
      let dx = touch.clientX - centerX;
      let dy = touch.clientY - centerY;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist > maxDist) {
        dx = dx / dist * maxDist;
        dy = dy / dist * maxDist;
      }
      joystickVector.set(dx / maxDist, -dy / maxDist);
      joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    lookArea.addEventListener('touchstart', (e) => {
      e.preventDefault();
      lastLookTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });
    lookArea.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!lastLookTouch) return;
      const touch = e.touches[0];
      const dx = touch.clientX - lastLookTouch.x;
      const dy = touch.clientY - lastLookTouch.y;
      lookDelta.set(dx, dy);
      lastLookTouch = { x: touch.clientX, y: touch.clientY };
    });
    lookArea.addEventListener('touchend', (e) => {
      e.preventDefault();
      lastLookTouch = null;
      lookDelta.set(0,0);
    });
    lookArea.addEventListener('touchcancel', () => {
      lastLookTouch = null;
      lookDelta.set(0,0);
    });

    function handleFlyMovement(dt) {
      if (!flyMode) return;
      const speed = flySpeed * dt;
      const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
      const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
      if (joystickVector.length() > 0.1) {
        camera.position.addScaledVector(forward, joystickVector.y * speed);
        camera.position.addScaledVector(right, joystickVector.x * speed);
      }
      if (lookDelta.length() > 0) {
        euler.setFromQuaternion(camera.quaternion);
        euler.y -= lookDelta.x * 0.003;
        euler.x -= lookDelta.y * 0.003;
        euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
        camera.quaternion.setFromEuler(euler);
        lookDelta.set(0,0);
      }
      const pos = camera.position;
      coordDisplay.textContent = `X: ${pos.x.toFixed(1)} Y: ${pos.y.toFixed(1)} Z: ${pos.z.toFixed(1)}`;
    }

    // ==================== MODEL YÜKLEME ====================
    const loader = new GLTFLoader();
    const modelsToLoad = [
      { key:'map', path:'models/fnaf_map.glb', type:'map' },
      { key:'freddy', path:'models/freddy-fnaf.glb', type:'animatronic' },
      { key:'bonnie', path:'models/bonnie-fnaf.glb', type:'animatronic' },
      { key:'chica', path:'models/chica-fnaf.glb', type:'animatronic' },
      { key:'foxy', path:'models/foxy-fnaf.glb', type:'animatronic' },
      { key:'tablet', path:'models/tablet_animation.glb', type:'tablet' }
    ];
    let mapModel = null, tabletModel = null;
    const totalModels = modelsToLoad.length;
    let loadedModels = 0;

    function updateLoadingProgress(progress) {
      const p = Math.min(100, Math.floor(progress*100));
      progressFill.style.width = p+'%';
      progressText.textContent = '%'+p;
    }

    function loadModel(entry) {
      return new Promise((resolve) => {
        loader.load(entry.path,
          (gltf) => resolve({key:entry.key, model:gltf.scene, type:entry.type}),
          (xhr) => {
            if (xhr.total>0) {
              const mp = xhr.loaded/xhr.total;
              updateLoadingProgress((loadedModels+mp)/totalModels);
            }
          },
          () => resolve({key:entry.key, model:null, type:entry.type, error:true})
        );
      });
    }

    async function loadAllModels() {
      const results = await Promise.all(modelsToLoad.map(loadModel));
      results.forEach(res => {
        if (res.error || !res.model) return;
        if (res.type==='map') {
          mapModel = res.model;
          mapModel.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}});
          scene.add(mapModel);
          mapModel.traverse(n=>{
            if (n.name.includes('LeftDoor')||n.name.includes('left_door')) leftDoorPanel = n;
            if (n.name.includes('RightDoor')||n.name.includes('right_door')) rightDoorPanel = n;
          });
        } else if (res.type==='animatronic') {
          const a = animatronics[res.key];
          if (a) {
            a.model = res.model;
            a.model.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}});
            a.group.add(a.model);
            scene.add(a.group);
            a.group.visible = false;
          }
        } else if (res.type==='tablet') {
          tabletModel = res.model;
          tabletModel.visible = false;
          tabletModel.position.set(0.2,1.2,-0.8);
          scene.add(tabletModel);
        }
      });
      if (!leftDoorPanel || !rightDoorPanel) createSimpleDoorPanels();
      updateLoadingProgress(1);
      setTimeout(()=>{
        loadingScreen.style.display='none';
        mainMenu.classList.add('active');
      },500);
    }

    // ==================== TABLET & UI ====================
    function buildCameraGrid() {
      cameraGrid.innerHTML = '';
      cameras.forEach((cam,i)=>{
        const cell = document.createElement('div');
        cell.className = 'cam-cell'; cell.textContent = cam.label; cell.dataset.index = i;
        if (i===currentCameraIndex) cell.classList.add('selected');
        const ind = document.createElement('div'); ind.className='anim-indicator'; ind.id='indicator-'+cam.id;
        cell.appendChild(ind);
        cell.addEventListener('click',()=>{ currentCameraIndex=i; updateCameraSelection(); updateCurrentCamLabel(); });
        cameraGrid.appendChild(cell);
      });
      updateCurrentCamLabel();
    }
    function updateCameraSelection() {
      cameraGrid.querySelectorAll('.cam-cell').forEach((c,i)=>c.classList.toggle('selected',i===currentCameraIndex));
    }
    function updateCurrentCamLabel() { currentCamLabel.textContent = cameras[currentCameraIndex].label; }
    function updateCameraIndicators() {
      const posToCam = {
        freddy:['1A','1B','7','6','4A','4B','rightDoor'],
        bonnie:['1A','1B','2A','2B','3','leftDoor'],
        chica:['1A','1B','4A','4B','6','rightDoor'],
        foxy:['1C','2A','2B','leftDoor','leftDoor']
      };
      const pres = {}; cameras.forEach(c=>pres[c.id]=[]);
      Object.keys(animatronics).forEach(key=>{
        const a=animatronics[key]; const list=posToCam[key];
        if(a.position<list.length){ const cid=list[a.position]; if(cid&&pres[cid]) pres[cid].push(key); }
      });
      cameras.forEach(c=>{
        const ind=document.getElementById('indicator-'+c.id);
        if(ind) ind.classList.toggle('visible', pres[c.id]?.length>0);
      });
    }

    // ==================== OYUN MEKANİKLERİ ====================
    function setNightDifficulty(night) {
      const diffMap = {
        1:{freddy:0,bonnie:1,chica:1,foxy:0}, 2:{freddy:1,bonnie:2,chica:2,foxy:1},
        3:{freddy:2,bonnie:3,chica:3,foxy:2}, 4:{freddy:3,bonnie:4,chica:4,foxy:3},
        5:{freddy:4,bonnie:5,chica:5,foxy:4}
      };
      const d = diffMap[night]||diffMap[1];
      animatronics.freddy.difficulty=d.freddy; animatronics.bonnie.difficulty=d.bonnie;
      animatronics.chica.difficulty=d.chica; animatronics.foxy.difficulty=d.foxy;
      animatronics.freddy.moveInterval=Math.max(1.8,4.5-d.freddy*0.6);
      animatronics.bonnie.moveInterval=Math.max(1.5,3.8-d.bonnie*0.5);
      animatronics.chica.moveInterval=Math.max(1.6,4.0-d.chica*0.5);
      animatronics.foxy.moveInterval=Math.max(2.0,5.5-d.foxy*0.7);
    }

    function resetGameState() {
      power=100; elapsedGameTime=0;
      doorLeftClosed=doorRightClosed=lightLeftOn=lightRightOn=tabletOpen=false;
      gameOver=playerWon=false;
      Object.values(animatronics).forEach(a=>{a.position=0;a.moveTimer=0;a.group.visible=false;});
      if(leftDoorPanel) leftDoorPanel.position.y=1.15;
      if(rightDoorPanel) rightDoorPanel.position.y=1.15;
      leftDoorLight.visible=rightDoorLight.visible=false;
      if(tabletModel) tabletModel.visible=false;
      updateUI(); tabletOverlay.classList.remove('active');
      currentCameraIndex=0; updateCameraSelection(); updateCurrentCamLabel();
      if(flyMode) setFlyMode(false);
      droneBtn.style.display = 'none';
    }

    function startNight(night) {
      currentNight=night; setNightDifficulty(night); resetGameState();
      gameRunning=true; mainMenu.classList.remove('active'); gameUI.classList.add('active');
      winOverlay.classList.remove('active'); jumpscareOverlay.classList.remove('active');
      droneBtn.style.display = 'block';
      lastTimestamp=performance.now(); updateUI(); updateAnimatronicVisibility();
    }

    function endNight(won) {
      gameRunning=false; gameUI.classList.remove('active'); tabletOverlay.classList.remove('active');
      tabletOpen=false; if(tabletModel) tabletModel.visible=false;
      if(flyMode) setFlyMode(false);
      droneBtn.style.display = 'none';
      if(won){ playerWon=true; winOverlay.classList.add('active'); }
      else { gameOver=true; triggerJumpscare(); }
    }

    function triggerJumpscare() {
      jumpscareOverlay.classList.add('active');
      const ctx=jumpscareCanvas.getContext('2d');
      ctx.fillStyle='#000'; ctx.fillRect(0,0,400,400);
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(200,200,120,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(160,170,25,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(240,170,25,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#f00'; ctx.beginPath(); ctx.ellipse(200,260,50,30,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; for(let i=0;i<8;i++) ctx.fillRect(170+i*8,250,5,25);
      playJumpscareSound();
      setTimeout(()=>{
        jumpscareOverlay.classList.remove('active');
        mainMenu.classList.add('active'); gameUI.classList.remove('active');
      },3500);
    }

    function playJumpscareSound() {
      try{
        const ac=new(window.AudioContext||window.webkitAudioContext)();
        const buf=ac.createBuffer(1,ac.sampleRate*1.5,ac.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++){const t=i/ac.sampleRate; d[i]=(Math.random()*2-1)*Math.exp(-t*3)*0.8+Math.sin(t*150*(1+t*10))*0.3*Math.exp(-t*2)+Math.sin(t*80*(1-t))*0.2*Math.exp(-t*2.5);}
        const src=ac.createBufferSource(); src.buffer=buf; src.connect(ac.destination); src.start();
        setTimeout(()=>ac.close(),2000);
      }catch(e){}
    }
    function playClickSound() {
      try{
        const ac=new(window.AudioContext||window.webkitAudioContext)();
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='square'; o.frequency.value=800; g.gain.setValueAtTime(0.1,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
        o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+0.1);
        setTimeout(()=>ac.close(),200);
      }catch(e){}
    }

    function updateUI() {
      powerValue.textContent=power.toFixed(1)+'%';
      powerValue.classList.toggle('danger',power<=15); powerValue.classList.toggle('warning',power>15&&power<=30);
      const m=Math.floor((elapsedGameTime/NIGHT_DURATION)*360);
      timeValue.textContent=`${Math.floor(m/60)===0?'12':Math.floor(m/60)<6?Math.floor(m/60):6}:${(m%60).toString().padStart(2,'0')} AM`;
      doorLeftBtn.textContent=doorLeftClosed?'🚪 KAPALI':'🚪 AÇIK'; doorLeftBtn.classList.toggle('door-closed',doorLeftClosed);
      doorRightBtn.textContent=doorRightClosed?'🚪 KAPALI':'🚪 AÇIK'; doorRightBtn.classList.toggle('door-closed',doorRightClosed);
      lightLeftBtn.classList.toggle('light-on',lightLeftOn); lightRightBtn.classList.toggle('light-on',lightRightOn);
      openTabletBtn.classList.toggle('pressed',tabletOpen);
    }

    function updateAnimatronicVisibility() {
      const l=new THREE.Vector3(-4,1,-4.5), r=new THREE.Vector3(4,1,-4.5), c=new THREE.Vector3(0,1,-1);
      animatronics.bonnie.group.visible=(animatronics.bonnie.position===5&&!doorLeftClosed);
      if(animatronics.bonnie.group.visible) animatronics.bonnie.group.position.copy(l);
      animatronics.chica.group.visible=(animatronics.chica.position===5&&!doorRightClosed);
      if(animatronics.chica.group.visible) animatronics.chica.group.position.copy(r);
      animatronics.freddy.group.visible=(animatronics.freddy.position===6&&!doorRightClosed);
      if(animatronics.freddy.group.visible) animatronics.freddy.group.position.copy(r);
      animatronics.foxy.group.visible=(animatronics.foxy.position>=3&&animatronics.foxy.position<=4);
      if(animatronics.foxy.position===3&&!doorLeftClosed) animatronics.foxy.group.position.copy(l);
      else if(animatronics.foxy.position===4){ animatronics.foxy.group.position.copy(c); if(gameRunning) endNight(false); }
      if(doorLeftClosed){ if(animatronics.bonnie.position===5) animatronics.bonnie.group.visible=false; if(animatronics.foxy.position===3) animatronics.foxy.group.visible=false; }
      if(doorRightClosed){ if(animatronics.chica.position===5) animatronics.chica.group.visible=false; if(animatronics.freddy.position===6) animatronics.freddy.group.visible=false; }
    }

    function moveAnimatronic(key) {
      const a=animatronics[key]; if(a.position>=a.maxPos) return;
      if(Math.random()<(0.35+a.difficulty*0.1)){
        a.position++;
        if(key==='foxy'&&a.position===4){ updateAnimatronicVisibility(); if(!doorLeftClosed&&gameRunning) endNight(false); return; }
        if((key==='bonnie'&&a.position===5&&!doorLeftClosed)||(key==='chica'&&a.position===5&&!doorRightClosed)||(key==='freddy'&&a.position===6&&!doorRightClosed)){
          updateAnimatronicVisibility();
          if(gameRunning) setTimeout(()=>{ if(gameRunning&&((key==='bonnie'&&a.position===5&&!doorLeftClosed)||(key==='chica'&&a.position===5&&!doorRightClosed)||(key==='freddy'&&a.position===6&&!doorRightClosed))) endNight(false); },2500+Math.random()*4000);
        }
      }
      updateAnimatronicVisibility(); updateCameraIndicators();
    }

    function updateAI(dt) {
      if(!gameRunning||gameOver||playerWon) return;
      Object.keys(animatronics).forEach(k=>{
        const a=animatronics[k]; a.moveTimer+=dt;
        if(a.moveTimer>=a.moveInterval){ a.moveTimer=0; moveAnimatronic(k); }
      });
      if(tabletOpen&&cameras[currentCameraIndex].id==='1C') animatronics.foxy.moveTimer-=dt*0.6;
    }

    function updatePowerConsumption(dt) {
      if(!gameRunning||gameOver||playerWon) return;
      let rate=0.3;
      if(doorLeftClosed) rate+=1.2; if(doorRightClosed) rate+=1.2;
      if(lightLeftOn) rate+=0.8; if(lightRightOn) rate+=0.8;
      if(tabletOpen) rate+=0.9;
      power-=rate*dt; if(power<=0){ power=0; endNight(false); }
      updateUI();
    }

    function updateTime(dt) {
      if(!gameRunning||gameOver||playerWon) return;
      elapsedGameTime+=dt;
      if(elapsedGameTime>=NIGHT_DURATION){ elapsedGameTime=NIGHT_DURATION; endNight(true); }
      updateUI();
    }

    // ==================== OLAY DİNLEYİCİLER ====================
    function setupEventListeners() {
      document.querySelectorAll('.night-btn').forEach(b=>b.addEventListener('click',()=>{ playClickSound(); startNight(parseInt(b.dataset.night)); }));
      
      doorLeftBtn.addEventListener('click',()=>{ if(!gameRunning||gameOver) return; doorLeftClosed=!doorLeftClosed; playClickSound(); if(leftDoorPanel) leftDoorPanel.position.y=doorLeftClosed?-1.5:1.15; updateUI(); updateAnimatronicVisibility(); });
      doorRightBtn.addEventListener('click',()=>{ if(!gameRunning||gameOver) return; doorRightClosed=!doorRightClosed; playClickSound(); if(rightDoorPanel) rightDoorPanel.position.y=doorRightClosed?-1.5:1.15; updateUI(); updateAnimatronicVisibility(); });
      
      const lon=(s)=>{if(!gameRunning||gameOver)return; if(s==='left'){lightLeftOn=true;leftDoorLight.visible=true;}else{lightRightOn=true;rightDoorLight.visible=true;} updateUI();updateAnimatronicVisibility();};
      const loff=(s)=>{if(s==='left'){lightLeftOn=false;leftDoorLight.visible=false;}else{lightRightOn=false;rightDoorLight.visible=false;} updateUI();updateAnimatronicVisibility();};
      
      lightLeftBtn.addEventListener('mousedown',()=>lon('left')); lightLeftBtn.addEventListener('mouseup',()=>loff('left')); lightLeftBtn.addEventListener('mouseleave',()=>loff('left'));
      lightLeftBtn.addEventListener('touchstart',e=>{e.preventDefault();lon('left');}); lightLeftBtn.addEventListener('touchend',e=>{e.preventDefault();loff('left');});
      lightRightBtn.addEventListener('mousedown',()=>lon('right')); lightRightBtn.addEventListener('mouseup',()=>loff('right')); lightRightBtn.addEventListener('mouseleave',()=>loff('right'));
      lightRightBtn.addEventListener('touchstart',e=>{e.preventDefault();lon('right');}); lightRightBtn.addEventListener('touchend',e=>{e.preventDefault();loff('right');});
      
      openTabletBtn.addEventListener('click',()=>{ if(!gameRunning||gameOver) return; tabletOpen=!tabletOpen; if(tabletOpen){ tabletOverlay.classList.add('active'); if(tabletModel) tabletModel.visible=true; updateCameraIndicators(); } else { tabletOverlay.classList.remove('active'); if(tabletModel) tabletModel.visible=false; } playClickSound(); updateUI(); updateAnimatronicVisibility(); });
      closeTabletBtn.addEventListener('click',()=>{ tabletOpen=false; tabletOverlay.classList.remove('active'); if(tabletModel) tabletModel.visible=false; playClickSound(); updateUI(); updateAnimatronicVisibility(); });
      
      backToMenuBtn.addEventListener('click',()=>{ winOverlay.classList.remove('active'); mainMenu.classList.add('active'); gameUI.classList.remove('active'); gameRunning=false;gameOver=false;playerWon=false; resetGameState(); });
      
      droneBtn.addEventListener('click', () => {
        if (!gameRunning || gameOver || playerWon) return;
        setFlyMode(!flyMode);
        playClickSound();
      });

      window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });

      window.addEventListener('keydown', (e) => {
        if (!gameRunning || gameOver || playerWon || flyMode) return;
        if (e.key.toLowerCase() === 'a') { doorLeftClosed=!doorLeftClosed; if(leftDoorPanel) leftDoorPanel.position.y=doorLeftClosed?-1.5:1.15; playClickSound(); }
        if (e.key.toLowerCase() === 'd') { doorRightClosed=!doorRightClosed; if(rightDoorPanel) rightDoorPanel.position.y=doorRightClosed?-1.5:1.15; playClickSound(); }
        if (e.key.toLowerCase() === 'q') lon('left');
        if (e.key.toLowerCase() === 'e') lon('right');
        if (e.key === ' ') { e.preventDefault(); openTabletBtn.click(); }
        updateUI(); updateAnimatronicVisibility();
      });
      window.addEventListener('keyup', (e) => {
        if (!gameRunning || gameOver || playerWon || flyMode) return;
        if (e.key.toLowerCase() === 'q') loff('left');
        if (e.key.toLowerCase() === 'e') loff('right');
        updateUI(); updateAnimatronicVisibility();
      });
    }

    // ==================== OYUN DÖNGÜSÜ ====================
    function gameLoop(ts) {
      requestAnimationFrame(gameLoop);
      if (lastTimestamp === 0) lastTimestamp = ts;
      const dt = Math.min(0.1, (ts - lastTimestamp) / 1000);
      lastTimestamp = ts;

      if (gameRunning && !gameOver && !playerWon) {
        if (flyMode) {
          handleFlyMovement(dt);
          updateAI(dt);
          updatePowerConsumption(dt);
          updateTime(dt);
          updateUI();
        } else {
          updateAI(tabletOpen ? dt * 0.3 : dt);
          updatePowerConsumption(dt);
          updateTime(dt);
          updateUI();
          if (tabletOpen) updateCameraIndicators();
        }
      }
      renderer.render(scene, camera);
    }

    // ==================== BAŞLAT ====================
    async function init() {
      buildCameraGrid();
      setupEventListeners();
      resetGameState();
      await loadAllModels();
      requestAnimationFrame(gameLoop);
    }
    init();
  </script>
</body>
</html>
