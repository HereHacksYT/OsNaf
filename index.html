<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OsNaf - Five Nights at Freddy's Web</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Yükleme Ekranı */
    #loadingScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      text-shadow: 0 0 15px #ff0000;
    }
    #loadingScreen h2 {
      font-size: 2em;
      margin-bottom: 30px;
      animation: flicker 2s infinite;
      color: #ff4444;
    }
    .progress-bar-container {
      width: 60%;
      max-width: 500px;
      height: 30px;
      background: #222;
      border: 2px solid #ff0000;
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #ff0000;
      box-shadow: 0 0 20px #ff0000;
      transition: width 0.3s;
    }
    .progress-text {
      margin-top: 15px;
      font-size: 0.8em;
      color: #ff6666;
    }

    /* Ana Menü */
    #mainMenu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #1a0a0a 0%, #000 90%);
      z-index: 100;
      display: none; /* Başlangıçta gizli, yükleme bitince göster */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-shadow: 0 0 15px #ff0000;
    }
    #mainMenu.active {
      display: flex;
    }

    #mainMenu h1 {
      font-size: 4em;
      margin: 0;
      letter-spacing: 8px;
      animation: flicker 2s infinite;
      color: #ff4444;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.3; }
    }

    .subtitle {
      font-size: 0.9em;
      margin-bottom: 50px;
      color: #aaa;
      letter-spacing: 4px;
    }

    .night-select {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .night-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.2em;
      padding: 20px 30px;
      background: #111;
      color: #ff6666;
      border: 2px solid #ff0000;
      cursor: pointer;
      transition: all 0.3s;
      text-shadow: 0 0 10px #ff0000;
      box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }
    .night-btn:hover {
      background: #330000;
      box-shadow: 0 0 30px #ff0000;
      transform: scale(1.05);
      color: #fff;
    }
    .night-btn:active {
      transform: scale(0.95);
    }

    /* Oyun UI */
    #gameUI {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      display: none;
    }
    #gameUI.active {
      display: block;
    }

    #topBar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 60px;
      align-items: center;
      background: rgba(0,0,0,0.8);
      padding: 12px 30px;
      border: 2px solid #333;
      border-radius: 5px;
      color: #fff;
      font-size: 1.1em;
      pointer-events: auto;
    }
    .power-indicator { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
    .power-indicator.warning { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
    .power-indicator.danger { color: #ff0000; text-shadow: 0 0 15px #ff0000; animation: blink 0.5s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    .time-indicator { color: #ffffff; font-size: 1.4em; }

    #bottomControls {
      position: absolute;
      bottom: 30px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 10%;
      box-sizing: border-box;
      pointer-events: auto;
    }
    .door-control { display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .ctrl-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7em;
      padding: 15px 20px;
      background: rgba(20,20,20,0.9);
      color: #ccc;
      border: 2px solid #555;
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: auto;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 4px;
    }
    .ctrl-btn:active, .ctrl-btn.pressed { background: #444; border-color: #fff; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
    .ctrl-btn.door-closed { background: #550000; border-color: #ff0000; color: #ff4444; box-shadow: 0 0 20px rgba(255,0,0,0.6); }
    .ctrl-btn.light-on { background: #444400; border-color: #ffff00; color: #ffff00; box-shadow: 0 0 20px rgba(255,255,0,0.5); }

    /* Tablet 2D Arayüz (Yedek) */
    #tabletOverlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 75%; max-width: 800px;
      aspect-ratio: 4/3;
      background: #111;
      border: 8px solid #444;
      border-radius: 15px;
      display: none;
      z-index: 20;
      pointer-events: auto;
      flex-direction: column;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }
    #tabletOverlay.active { display: flex; }
    #tabletHeader { background: #222; padding: 10px; text-align: center; color: #fff; font-size: 0.7em; border-bottom: 2px solid #555; }
    #cameraGrid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 5px; padding: 10px; flex: 1; background: #0a0a0a; }
    .cam-cell { background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.5em; cursor: pointer; transition: all 0.2s; position: relative; text-align: center; padding: 5px; }
    .cam-cell:hover { border-color: #888; background: #222; }
    .cam-cell.selected { border: 2px solid #00ff00; box-shadow: 0 0 10px #00ff00; color: #fff; }
    .cam-cell .anim-indicator { position: absolute; bottom: 5px; right: 5px; width: 10px; height: 10px; border-radius: 50%; background: #ff0000; box-shadow: 0 0 8px #ff0000; display: none; }
    .cam-cell .anim-indicator.visible { display: block; }
    #tabletClose { font-family: 'Press Start 2P', monospace; background: #550000; color: #fff; border: none; padding: 15px; cursor: pointer; font-size: 0.7em; letter-spacing: 2px; border-top: 2px solid #555; border-radius: 0 0 8px 8px; }
    #tabletClose:hover { background: #880000; }

    /* Jumpscare */
    #jumpscareOverlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50;
      display: none; background: #000; justify-content: center; align-items: center; flex-direction: column;
    }
    #jumpscareOverlay.active { display: flex; }
    #jumpscareCanvas { max-width: 90%; max-height: 90%; animation: shake 0.15s infinite; }
    @keyframes shake {
      0% { transform: translate(2px, 0) rotate(0.5deg); }
      25% { transform: translate(-3px, 2px) rotate(-0.5deg); }
      50% { transform: translate(1px, -2px) rotate(0.3deg); }
      75% { transform: translate(-2px, -1px) rotate(-0.3deg); }
      100% { transform: translate(2px, 1px) rotate(0.5deg); }
    }
    .gameover-text { color: #ff0000; font-size: 2em; margin-top: 30px; text-shadow: 0 0 30px #ff0000; animation: blink 0.3s infinite; }

    /* Kazanma */
    #winOverlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 60;
      background: radial-gradient(circle, #111 0%, #000 90%);
      display: none; flex-direction: column; align-items: center; justify-content: center; color: #ffdd00;
    }
    #winOverlay.active { display: flex; }
    #winOverlay h2 { font-size: 2.5em; text-shadow: 0 0 30px #ffdd00; }
    #backToMenu { font-family: 'Press Start 2P', monospace; font-size: 0.9em; margin-top: 40px; padding: 15px 30px; background: #222; color: #ffdd00; border: 2px solid #ffdd00; cursor: pointer; }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- Yükleme Ekranı -->
  <div id="loadingScreen">
    <h2>OsNaf Yükleniyor...</h2>
    <div class="progress-bar-container">
      <div id="progressFill" class="progress-bar-fill" style="width: 0%;"></div>
    </div>
    <p id="progressText" class="progress-text">%0</p>
  </div>

  <!-- Ana Menü -->
  <div id="mainMenu">
    <h1>OsNaf</h1>
    <p class="subtitle">Beş Gece. Hayatta Kal.</p>
    <div class="night-select">
      <button class="night-btn" data-night="1">Gece 1</button>
      <button class="night-btn" data-night="2">Gece 2</button>
      <button class="night-btn" data-night="3">Gece 3</button>
      <button class="night-btn" data-night="4">Gece 4</button>
      <button class="night-btn" data-night="5">Gece 5</button>
    </div>
    <p style="font-size:0.6em; color:#666;">(Özel modeller: modeller/ klasöründe)</p>
  </div>

  <!-- Oyun UI -->
  <div id="gameUI">
    <div id="topBar">
      <span>Güç: <span id="powerValue" class="power-indicator">100.0%</span></span>
      <span id="timeValue" class="time-indicator">12:00 AM</span>
    </div>
    <div id="bottomControls">
      <div class="door-control">
        <button id="lightLeft" class="ctrl-btn">🔦 Işık</button>
        <button id="doorLeft" class="ctrl-btn">🚪 Kapı</button>
      </div>
      <button id="openTablet" class="ctrl-btn" style="align-self:center; padding:20px 30px; font-size:0.8em;">📹 Kamera</button>
      <div class="door-control">
        <button id="lightRight" class="ctrl-btn">🔦 Işık</button>
        <button id="doorRight" class="ctrl-btn">🚪 Kapı</button>
      </div>
    </div>
  </div>

  <!-- Tablet (2D yedek) -->
  <div id="tabletOverlay">
    <div id="tabletHeader">GÜVENLİK KAMERALARI - <span id="currentCamLabel">Kamera 1A</span></div>
    <div id="cameraGrid"></div>
    <button id="tabletClose">TABLETİ KAPAT</button>
  </div>

  <!-- Jumpscare -->
  <div id="jumpscareOverlay">
    <canvas id="jumpscareCanvas" width="400" height="400"></canvas>
    <div class="gameover-text">GAME OVER</div>
  </div>

  <!-- Kazanma -->
  <div id="winOverlay">
    <h2>5:59 AM</h2>
    <p style="font-size:1.5em;">Hayatta Kaldın!</p>
    <button id="backToMenu">Menüye Dön</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ==================== DOM ====================
    const loadingScreen = document.getElementById('loadingScreen');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const mainMenu = document.getElementById('mainMenu');
    const gameUI = document.getElementById('gameUI');
    const powerValue = document.getElementById('powerValue');
    const timeValue = document.getElementById('timeValue');
    const tabletOverlay = document.getElementById('tabletOverlay');
    const cameraGrid = document.getElementById('cameraGrid');
    const currentCamLabel = document.getElementById('currentCamLabel');
    const jumpscareOverlay = document.getElementById('jumpscareOverlay');
    const jumpscareCanvas = document.getElementById('jumpscareCanvas');
    const winOverlay = document.getElementById('winOverlay');
    const backToMenuBtn = document.getElementById('backToMenu');

    const doorLeftBtn = document.getElementById('doorLeft');
    const doorRightBtn = document.getElementById('doorRight');
    const lightLeftBtn = document.getElementById('lightLeft');
    const lightRightBtn = document.getElementById('lightRight');
    const openTabletBtn = document.getElementById('openTablet');
    const closeTabletBtn = document.getElementById('tabletClose');

    // ==================== OYUN DEĞİŞKENLERİ ====================
    let currentNight = 1;
    let power = 100.0;
    let elapsedGameTime = 0;
    let gameRunning = false;
    let gameOver = false;
    let playerWon = false;
    let doorLeftClosed = false;
    let doorRightClosed = false;
    let lightLeftOn = false;
    let lightRightOn = false;
    let tabletOpen = false;
    let lastTimestamp = 0;
    const NIGHT_DURATION = 360; // 6 dakika

    // Animatronikler
    const animatronics = {
      freddy: { name: 'Freddy', position: 0, maxPos: 6, difficulty: 0, moveTimer: 0, moveInterval: 5.0, model: null, group: new THREE.Group() },
      bonnie: { name: 'Bonnie', position: 0, maxPos: 5, difficulty: 0, moveTimer: 0, moveInterval: 4.0, model: null, group: new THREE.Group() },
      chica:  { name: 'Chica',  position: 0, maxPos: 5, difficulty: 0, moveTimer: 0, moveInterval: 4.5, model: null, group: new THREE.Group() },
      foxy:   { name: 'Foxy',   position: 0, maxPos: 4, difficulty: 0, moveTimer: 0, moveInterval: 6.0, model: null, group: new THREE.Group() }
    };

    // Kameralar
    const cameras = [
      { id: '1A', label: 'Sahne (1A)', row: 0, col: 0 },
      { id: '1B', label: 'Yemek Alanı (1B)', row: 0, col: 1 },
      { id: '1C', label: 'Korsan Koyu (1C)', row: 0, col: 2 },
      { id: '2A', label: 'Batı Koridor (2A)', row: 1, col: 0 },
      { id: '2B', label: 'Batı Salon (2B)', row: 1, col: 1 },
      { id: '3',  label: 'Depo (3)', row: 1, col: 2 },
      { id: '4A', label: 'Doğu Koridor (4A)', row: 2, col: 0 },
      { id: '4B', label: 'Doğu Salon (4B)', row: 2, col: 1 },
      { id: '5',  label: 'Arka Oda (5)', row: 2, col: 2 },
      { id: '6',  label: 'Mutfak (6)', row: 3, col: 0 },
      { id: '7',  label: 'Tuvaletler (7)', row: 3, col: 1 }
    ];
    let currentCameraIndex = 0;

    // ==================== THREE.JS ====================
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.9;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 5, 30);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 1.7, 0.8);
    camera.lookAt(0, 1.5, -2);

    // Işıklar
    const ambientLight = new THREE.AmbientLight(0x111122, 0.4);
    scene.add(ambientLight);
    const overheadLight = new THREE.PointLight(0x444455, 4, 12);
    overheadLight.position.set(0, 3.5, -1);
    overheadLight.castShadow = true;
    scene.add(overheadLight);

    const leftDoorLight = new THREE.SpotLight(0xffeedd, 10, 15, Math.PI/6, 0.3, 1);
    leftDoorLight.position.set(-4, 1.5, -2);
    leftDoorLight.target.position.set(-4, 0.5, -5);
    leftDoorLight.visible = false;
    scene.add(leftDoorLight); scene.add(leftDoorLight.target);

    const rightDoorLight = new THREE.SpotLight(0xffeedd, 10, 15, Math.PI/6, 0.3, 1);
    rightDoorLight.position.set(4, 1.5, -2);
    rightDoorLight.target.position.set(4, 0.5, -5);
    rightDoorLight.visible = false;
    scene.add(rightDoorLight); scene.add(rightDoorLight.target);

    // Basit kapı panelleri (haritada kapı yoksa kullanılacak)
    let leftDoorPanel, rightDoorPanel;
    function createSimpleDoorPanels() {
      const leftGeo = new THREE.BoxGeometry(0.15, 2.3, 1.0);
      const leftMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 });
      leftDoorPanel = new THREE.Mesh(leftGeo, leftMat);
      leftDoorPanel.position.set(-4, 1.15, -3.5);
      leftDoorPanel.name = 'leftDoorPanel';
      scene.add(leftDoorPanel);

      const rightGeo = new THREE.BoxGeometry(0.15, 2.3, 1.0);
      const rightMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 });
      rightDoorPanel = new THREE.Mesh(rightGeo, rightMat);
      rightDoorPanel.position.set(4, 1.15, -3.5);
      rightDoorPanel.name = 'rightDoorPanel';
      scene.add(rightDoorPanel);
    }

    // ==================== MODEL YÜKLEME ====================
    const loader = new GLTFLoader();
    const modelsToLoad = [
      { key: 'map', path: 'models/fnaf_map.glb', type: 'map' },
      { key: 'freddy', path: 'models/freddy-fnaf.glb', type: 'animatronic' },
      { key: 'bonnie', path: 'models/bonnie-fnaf.glb', type: 'animatronic' },
      { key: 'chica', path: 'models/chica-fnaf.glb', type: 'animatronic' },
      { key: 'foxy', path: 'models/foxy-fnaf.glb', type: 'animatronic' },
      { key: 'tablet', path: 'models/tablet_animation.glb', type: 'tablet' }
    ];

    let mapModel = null;
    let tabletModel = null;
    let totalModels = modelsToLoad.length;
    let loadedModels = 0;

    function updateLoadingProgress(progress) {
      const percent = Math.min(100, Math.floor(progress * 100));
      progressFill.style.width = percent + '%';
      progressText.textContent = '%' + percent;
    }

    function loadModel(entry) {
      return new Promise((resolve, reject) => {
        loader.load(
          entry.path,
          (gltf) => {
            console.log(`${entry.path} yüklendi.`);
            resolve({ key: entry.key, model: gltf.scene, type: entry.type });
          },
          (xhr) => {
            // Tekil model ilerlemesi (toplam ilerlemeye katkı)
            if (xhr.total > 0) {
              const modelProgress = xhr.loaded / xhr.total;
              const overall = (loadedModels + modelProgress) / totalModels;
              updateLoadingProgress(overall);
            }
          },
          (error) => {
            console.warn(`${entry.path} yüklenemedi:`, error);
            resolve({ key: entry.key, model: null, type: entry.type, error: true });
          }
        );
      });
    }

    async function loadAllModels() {
      const promises = modelsToLoad.map(entry => loadModel(entry));
      const results = await Promise.all(promises);
      
      results.forEach(result => {
        if (result.error || !result.model) return;
        
        if (result.type === 'map') {
          mapModel = result.model;
          mapModel.scale.set(1,1,1);
          mapModel.traverse(node => {
            if (node.isMesh) {
              node.castShadow = true;
              node.receiveShadow = true;
            }
          });
          scene.add(mapModel);
          
          // Haritadaki kapı objelerini ara (isimlendirme: LeftDoor, RightDoor vb.)
          mapModel.traverse(node => {
            if (node.name.includes('LeftDoor') || node.name.includes('left_door')) {
              leftDoorPanel = node; // Basit panel yerine harita kapısını kullan
              console.log('Sol kapı bulundu:', node.name);
            }
            if (node.name.includes('RightDoor') || node.name.includes('right_door')) {
              rightDoorPanel = node;
              console.log('Sağ kapı bulundu:', node.name);
            }
          });
        }
        else if (result.type === 'animatronic') {
          const animKey = result.key;
          if (animatronics[animKey]) {
            const model = result.model;
            model.scale.set(1,1,1);
            model.traverse(node => {
              if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
              }
            });
            animatronics[animKey].model = model;
            animatronics[animKey].group.add(model);
            scene.add(animatronics[animKey].group);
            animatronics[animKey].group.visible = false;
          }
        }
        else if (result.type === 'tablet') {
          tabletModel = result.model;
          tabletModel.scale.set(1,1,1);
          tabletModel.visible = false;
          tabletModel.position.set(0.2, 1.2, -0.8); // Masanın üstünde
          scene.add(tabletModel);
        }
      });

      // Eğer harita kapıları bulunamadıysa basit panelleri oluştur
      if (!leftDoorPanel || !rightDoorPanel) {
        console.log('Haritada kapı bulunamadı, basit paneller oluşturuluyor.');
        createSimpleDoorPanels();
      } else {
        // Harita kapıları bulunduysa, onların başlangıç pozisyonlarını kaydet (opsiyonel)
        console.log('Harita kapıları kullanılacak.');
      }

      // Yükleme tamamlandı
      updateLoadingProgress(1);
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        mainMenu.classList.add('active');
      }, 500);
    }

    // ==================== TABLET KAMERA SİSTEMİ ====================
    function buildCameraGrid() {
      cameraGrid.innerHTML = '';
      cameras.forEach((cam, index) => {
        const cell = document.createElement('div');
        cell.className = 'cam-cell';
        cell.textContent = cam.label;
        cell.dataset.index = index;
        if (index === currentCameraIndex) cell.classList.add('selected');
        const indicator = document.createElement('div');
        indicator.className = 'anim-indicator';
        indicator.id = `indicator-${cam.id}`;
        cell.appendChild(indicator);
        cell.addEventListener('click', () => {
          currentCameraIndex = index;
          updateCameraSelection();
          updateCurrentCamLabel();
        });
        cameraGrid.appendChild(cell);
      });
      updateCurrentCamLabel();
    }
    function updateCameraSelection() {
      cameraGrid.querySelectorAll('.cam-cell').forEach((cell, i) => {
        cell.classList.toggle('selected', i === currentCameraIndex);
      });
    }
    function updateCurrentCamLabel() {
      currentCamLabel.textContent = cameras[currentCameraIndex].label;
    }
    function updateCameraIndicators() {
      const posToCam = {
        freddy: ['1A', '1B', '7', '6', '4A', '4B', 'rightDoor'],
        bonnie: ['1A', '1B', '2A', '2B', '3', 'leftDoor'],
        chica: ['1A', '1B', '4A', '4B', '6', 'rightDoor'],
        foxy: ['1C', '2A', '2B', 'leftDoor', 'leftDoor']
      };
      const camPresence = {};
      cameras.forEach(cam => camPresence[cam.id] = []);
      
      Object.keys(animatronics).forEach(key => {
        const anim = animatronics[key];
        const camList = posToCam[key];
        if (anim.position < camList.length) {
          const camId = camList[anim.position];
          if (camId && camPresence[camId]) camPresence[camId].push(key);
        }
      });
      cameras.forEach(cam => {
        const ind = document.getElementById(`indicator-${cam.id}`);
        if (ind) ind.classList.toggle('visible', camPresence[cam.id]?.length > 0);
      });
    }

    // ==================== OYUN MEKANİKLERİ ====================
    function setNightDifficulty(night) {
      const diffMap = {
        1: { freddy: 0, bonnie: 1, chica: 1, foxy: 0 },
        2: { freddy: 1, bonnie: 2, chica: 2, foxy: 1 },
        3: { freddy: 2, bonnie: 3, chica: 3, foxy: 2 },
        4: { freddy: 3, bonnie: 4, chica: 4, foxy: 3 },
        5: { freddy: 4, bonnie: 5, chica: 5, foxy: 4 }
      };
      const diff = diffMap[night] || diffMap[1];
      animatronics.freddy.difficulty = diff.freddy;
      animatronics.bonnie.difficulty = diff.bonnie;
      animatronics.chica.difficulty = diff.chica;
      animatronics.foxy.difficulty = diff.foxy;
      // Daha agresif hareket aralıkları (saniye)
      animatronics.freddy.moveInterval = Math.max(1.8, 4.5 - diff.freddy * 0.6);
      animatronics.bonnie.moveInterval = Math.max(1.5, 3.8 - diff.bonnie * 0.5);
      animatronics.chica.moveInterval = Math.max(1.6, 4.0 - diff.chica * 0.5);
      animatronics.foxy.moveInterval = Math.max(2.0, 5.5 - diff.foxy * 0.7);
    }

    function resetGameState() {
      power = 100.0;
      elapsedGameTime = 0;
      doorLeftClosed = false;
      doorRightClosed = false;
      lightLeftOn = false;
      lightRightOn = false;
      tabletOpen = false;
      gameOver = false;
      playerWon = false;
      Object.keys(animatronics).forEach(key => {
        animatronics[key].position = 0;
        animatronics[key].moveTimer = 0;
        animatronics[key].group.visible = false;
      });
      if (leftDoorPanel) leftDoorPanel.position.y = 1.15;
      if (rightDoorPanel) rightDoorPanel.position.y = 1.15;
      leftDoorLight.visible = false;
      rightDoorLight.visible = false;
      if (tabletModel) tabletModel.visible = false;
      updateUI();
      tabletOverlay.classList.remove('active');
      currentCameraIndex = 0;
      updateCameraSelection();
      updateCurrentCamLabel();
    }

    function startNight(night) {
      currentNight = night;
      setNightDifficulty(night);
      resetGameState();
      gameRunning = true;
      mainMenu.classList.remove('active');
      gameUI.classList.add('active');
      winOverlay.classList.remove('active');
      jumpscareOverlay.classList.remove('active');
      lastTimestamp = performance.now();
      updateUI();
      updateAnimatronicVisibility();
    }

    function endNight(won) {
      gameRunning = false;
      gameUI.classList.remove('active');
      tabletOverlay.classList.remove('active');
      tabletOpen = false;
      if (tabletModel) tabletModel.visible = false;
      if (won) {
        playerWon = true;
        winOverlay.classList.add('active');
      } else {
        gameOver = true;
        triggerJumpscare();
      }
    }

    function triggerJumpscare() {
      jumpscareOverlay.classList.add('active');
      const ctx = jumpscareCanvas.getContext('2d');
      jumpscareCanvas.width = 400; jumpscareCanvas.height = 400;
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,400,400);
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(200,200,120,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(160,170,25,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(240,170,25,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.ellipse(200,260,50,30,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      for (let i=0;i<8;i++) ctx.fillRect(170+i*8,250,5,25);
      playJumpscareSound();
      setTimeout(() => {
        jumpscareOverlay.classList.remove('active');
        mainMenu.classList.add('active');
        gameUI.classList.remove('active');
      }, 3500);
    }

    function playJumpscareSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const duration = 1.5;
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          const t = i / audioCtx.sampleRate;
          data[i] = (Math.random()*2-1) * Math.exp(-t*3) * 0.8;
          data[i] += Math.sin(t*150*(1+t*10))*0.3*Math.exp(-t*2);
          data[i] += Math.sin(t*80*(1-t))*0.2*Math.exp(-t*2.5);
        }
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start();
        setTimeout(() => audioCtx.close(), 2000);
      } catch(e) {}
    }

    function playClickSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime+0.1);
        setTimeout(() => audioCtx.close(), 200);
      } catch(e) {}
    }

    function updateUI() {
      powerValue.textContent = power.toFixed(1)+'%';
      const powerEl = powerValue;
      powerEl.classList.remove('warning','danger');
      if (power <= 15) powerEl.classList.add('danger');
      else if (power <= 30) powerEl.classList.add('warning');
      const totalMin = Math.floor((elapsedGameTime / NIGHT_DURATION) * 360);
      const h = Math.floor(totalMin/60);
      const m = totalMin%60;
      timeValue.textContent = `${h===0?'12':h<6?h:6}:${m.toString().padStart(2,'0')} AM`;
      doorLeftBtn.textContent = doorLeftClosed ? '🚪 KAPALI' : '🚪 AÇIK';
      doorLeftBtn.classList.toggle('door-closed', doorLeftClosed);
      doorRightBtn.textContent = doorRightClosed ? '🚪 KAPALI' : '🚪 AÇIK';
      doorRightBtn.classList.toggle('door-closed', doorRightClosed);
      lightLeftBtn.classList.toggle('light-on', lightLeftOn);
      lightRightBtn.classList.toggle('light-on', lightRightOn);
      openTabletBtn.classList.toggle('pressed', tabletOpen);
    }

    function updateAnimatronicVisibility() {
      const leftPos = new THREE.Vector3(-4, 1.0, -4.5);
      const rightPos = new THREE.Vector3(4, 1.0, -4.5);
      const officeCenter = new THREE.Vector3(0, 1.0, -1);

      animatronics.bonnie.group.visible = (animatronics.bonnie.position === 5 && !doorLeftClosed);
      if (animatronics.bonnie.group.visible) animatronics.bonnie.group.position.copy(leftPos);
      
      animatronics.chica.group.visible = (animatronics.chica.position === 5 && !doorRightClosed);
      if (animatronics.chica.group.visible) animatronics.chica.group.position.copy(rightPos);
      
      animatronics.freddy.group.visible = (animatronics.freddy.position === 6 && !doorRightClosed);
      if (animatronics.freddy.group.visible) animatronics.freddy.group.position.copy(rightPos);
      
      animatronics.foxy.group.visible = (animatronics.foxy.position >= 3 && animatronics.foxy.position <= 4);
      if (animatronics.foxy.position === 3 && !doorLeftClosed) animatronics.foxy.group.position.copy(leftPos);
      else if (animatronics.foxy.position === 4) {
        animatronics.foxy.group.position.copy(officeCenter);
        if (gameRunning) endNight(false);
      }

      if (doorLeftClosed) {
        if (animatronics.bonnie.position === 5) animatronics.bonnie.group.visible = false;
        if (animatronics.foxy.position === 3) animatronics.foxy.group.visible = false;
      }
      if (doorRightClosed) {
        if (animatronics.chica.position === 5) animatronics.chica.group.visible = false;
        if (animatronics.freddy.position === 6) animatronics.freddy.group.visible = false;
      }
    }

    function moveAnimatronic(key) {
      const anim = animatronics[key];
      if (anim.position >= anim.maxPos) return;
      const moveChance = 0.35 + anim.difficulty * 0.1;
      if (Math.random() < moveChance) {
        anim.position++;
        console.log(`${anim.name} -> pozisyon ${anim.position}`);
        if (key === 'foxy' && anim.position === 4) {
          updateAnimatronicVisibility();
          if (!doorLeftClosed && gameRunning) endNight(false);
          return;
        }
        if ((key === 'bonnie' && anim.position === 5 && !doorLeftClosed) ||
            (key === 'chica' && anim.position === 5 && !doorRightClosed) ||
            (key === 'freddy' && anim.position === 6 && !doorRightClosed)) {
          updateAnimatronicVisibility();
          if (gameRunning) {
            setTimeout(() => {
              if (gameRunning && 
                  ((key==='bonnie' && anim.position===5 && !doorLeftClosed) ||
                   (key==='chica' && anim.position===5 && !doorRightClosed) ||
                   (key==='freddy' && anim.position===6 && !doorRightClosed))) {
                endNight(false);
              }
            }, 2500 + Math.random()*4000);
          }
        }
      }
      updateAnimatronicVisibility();
      updateCameraIndicators();
    }

    function updateAI(deltaTime) {
      if (!gameRunning || gameOver || playerWon) return;
      Object.keys(animatronics).forEach(key => {
        const anim = animatronics[key];
        anim.moveTimer += deltaTime;
        if (anim.moveTimer >= anim.moveInterval) {
          anim.moveTimer = 0;
          moveAnimatronic(key);
        }
      });
      if (tabletOpen && cameras[currentCameraIndex].id === '1C') {
        animatronics.foxy.moveTimer -= deltaTime * 0.6;
      }
    }

    function updatePowerConsumption(deltaTime) {
      if (!gameRunning || gameOver || playerWon) return;
      let rate = 0.3;
      if (doorLeftClosed) rate += 1.2;
      if (doorRightClosed) rate += 1.2;
      if (lightLeftOn) rate += 0.8;
      if (lightRightOn) rate += 0.8;
      if (tabletOpen) rate += 0.9;
      power -= rate * deltaTime;
      if (power <= 0) { power = 0; endNight(false); }
      updateUI();
    }

    function updateTime(deltaTime) {
      if (!gameRunning || gameOver || playerWon) return;
      elapsedGameTime += deltaTime;
      if (elapsedGameTime >= NIGHT_DURATION) {
        elapsedGameTime = NIGHT_DURATION;
        endNight(true);
      }
      updateUI();
    }

    // ==================== OLAY DİNLEYİCİLER ====================
    function setupEventListeners() {
      document.querySelectorAll('.night-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          playClickSound();
          startNight(parseInt(btn.dataset.night));
        });
      });

      doorLeftBtn.addEventListener('click', () => {
        if (!gameRunning || gameOver) return;
        doorLeftClosed = !doorLeftClosed;
        playClickSound();
        if (leftDoorPanel) leftDoorPanel.position.y = doorLeftClosed ? -1.5 : 1.15;
        updateUI(); updateAnimatronicVisibility();
      });
      doorRightBtn.addEventListener('click', () => {
        if (!gameRunning || gameOver) return;
        doorRightClosed = !doorRightClosed;
        playClickSound();
        if (rightDoorPanel) rightDoorPanel.position.y = doorRightClosed ? -1.5 : 1.15;
        updateUI(); updateAnimatronicVisibility();
      });

      const lightOn = (side) => {
        if (!gameRunning || gameOver) return;
        if (side === 'left') { lightLeftOn = true; leftDoorLight.visible = true; }
        else { lightRightOn = true; rightDoorLight.visible = true; }
        updateUI(); updateAnimatronicVisibility();
      };
      const lightOff = (side) => {
        if (side === 'left') { lightLeftOn = false; leftDoorLight.visible = false; }
        else { lightRightOn = false; rightDoorLight.visible = false; }
        updateUI(); updateAnimatronicVisibility();
      };

      lightLeftBtn.addEventListener('mousedown', () => lightOn('left'));
      lightLeftBtn.addEventListener('mouseup', () => lightOff('left'));
      lightLeftBtn.addEventListener('mouseleave', () => lightOff('left'));
      lightLeftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); lightOn('left'); });
      lightLeftBtn.addEventListener('touchend', (e) => { e.preventDefault(); lightOff('left'); });
      lightRightBtn.addEventListener('mousedown', () => lightOn('right'));
      lightRightBtn.addEventListener('mouseup', () => lightOff('right'));
      lightRightBtn.addEventListener('mouseleave', () => lightOff('right'));
      lightRightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); lightOn('right'); });
      lightRightBtn.addEventListener('touchend', (e) => { e.preventDefault(); lightOff('right'); });

      openTabletBtn.addEventListener('click', () => {
        if (!gameRunning || gameOver) return;
        tabletOpen = !tabletOpen;
        if (tabletOpen) {
          tabletOverlay.classList.add('active');
          if (tabletModel) tabletModel.visible = true;
          updateCameraIndicators();
        } else {
          tabletOverlay.classList.remove('active');
          if (tabletModel) tabletModel.visible = false;
        }
        playClickSound();
        updateUI(); updateAnimatronicVisibility();
      });
      closeTabletBtn.addEventListener('click', () => {
        tabletOpen = false;
        tabletOverlay.classList.remove('active');
        if (tabletModel) tabletModel.visible = false;
        playClickSound();
        updateUI(); updateAnimatronicVisibility();
      });

      backToMenuBtn.addEventListener('click', () => {
        winOverlay.classList.remove('active');
        mainMenu.classList.add('active');
        gameUI.classList.remove('active');
        gameRunning = false; gameOver = false; playerWon = false;
        resetGameState();
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      window.addEventListener('keydown', (e) => {
        if (!gameRunning || gameOver || playerWon) return;
        if (e.key.toLowerCase() === 'a') {
          doorLeftClosed = !doorLeftClosed;
          if (leftDoorPanel) leftDoorPanel.position.y = doorLeftClosed ? -1.5 : 1.15;
          playClickSound();
        } else if (e.key.toLowerCase() === 'd') {
          doorRightClosed = !doorRightClosed;
          if (rightDoorPanel) rightDoorPanel.position.y = doorRightClosed ? -1.5 : 1.15;
          playClickSound();
        } else if (e.key.toLowerCase() === 'q') lightOn('left');
        else if (e.key.toLowerCase() === 'e') lightOn('right');
        else if (e.key === ' ') {
          e.preventDefault();
          openTabletBtn.click();
        }
        updateUI(); updateAnimatronicVisibility();
      });
      window.addEventListener('keyup', (e) => {
        if (e.key.toLowerCase() === 'q') lightOff('left');
        if (e.key.toLowerCase() === 'e') lightOff('right');
        updateUI(); updateAnimatronicVisibility();
      });
    }

    // ==================== OYUN DÖNGÜSÜ ====================
    function gameLoop(timestamp) {
      requestAnimationFrame(gameLoop);
      if (lastTimestamp === 0) lastTimestamp = timestamp;
      let deltaTime = Math.min(0.1, (timestamp - lastTimestamp) / 1000);
      lastTimestamp = timestamp;

      if (gameRunning && !gameOver && !playerWon) {
        const aiDelta = tabletOpen ? deltaTime * 0.3 : deltaTime;
        updateAI(aiDelta);
        updatePowerConsumption(deltaTime);
        updateTime(deltaTime);
        updateUI();
        if (tabletOpen) updateCameraIndicators();
      }

      renderer.render(scene, camera);
    }

    // ==================== BAŞLAT ====================
    async function init() {
      buildCameraGrid();
      setupEventListeners();
      resetGameState();
      // Modelleri yükle, yükleme ekranı göster
      await loadAllModels();
      // Yükleme tamamlandıktan sonra oyun döngüsü başlasın
      requestAnimationFrame(gameLoop);
    }

    init();
  </script>
</body>
</html>
